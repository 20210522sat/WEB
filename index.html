function sendBookingNotify(bData, slots){
  if(EJ_PUBLIC_KEY==="YOUR_PUBLIC_KEY") return; // 未設定時跳過

    to_email:   NOTIFY_EMAIL,

<style>
:root{
  --teal:#2F4F4F;--teal-lt:#eaf1f1;--teal-md:#b0c8c8;
  --amber:#BC7527;--amber-lt:#fef5e6;--amber-md:#f0d49a;

*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans TC',system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:16px;line-height:1.6;min-height:100vh}
.topbar{background:var(--teal);padding:0 28px;display:flex;align-items:center;justify-content:space-between;height:64px;position:sticky;top:0;z-index:200;box-shadow:0 2px 10px rgba(47,79,79,0.22)}
.logo{font-size:19px;font-weight:700;display:flex;align-items:center;gap:10px;color:#fff;white-space:nowrap}
.logo-icon{width:34px;height:34px;background:var(--gold);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#1a2424;border:1px solid rgba(0,0,0,0.15);font-size:16px;font-weight:700}
.nav-tabs{display:flex;gap:4px}
.nav-tab{padding:8px 22px;border-radius:8px;border:none;background:transparent;cursor:pointer;font-size:15px;font-family:inherit;color:rgba(255,255,255,.78);font-weight:500;transition:all .13s}
.nav-tab:hover{background:rgba(255,255,255,.13);color:#fff}
.nav-tab.active{background:var(--gold);color:var(--gold-dark,#2F4F4F);font-weight:700;box-shadow:0 1px 4px rgba(0,0,0,0.15)}
.main{padding:24px 28px;max-width:1340px;margin:0 auto}
.card{background:var(--white);border:1px solid var(--border);border-radius:14px;padding:24px 26px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
label{font-size:14px;color:var(--text-sub);display:block;margin-bottom:5px;font-weight:600}
input,select,textarea{width:100%;padding:10px 14px;border:1px solid var(--border-md);border-radius:var(--radius);font-size:16px;font-family:inherit;background:#fff;color:var(--text);outline:none;transition:border .12s}
input:focus,select:focus,textarea:focus{border-color:var(--teal);box-shadow:0 0 0 3px rgba(47,79,79,.10)}
.field{margin-bottom:14px}
.btn{padding:9px 20px;border-radius:8px;border:1px solid var(--border-md);background:transparent;cursor:pointer;font-size:15px;font-family:inherit;font-weight:500;color:var(--text);display:inline-flex;align-items:center;gap:6px;transition:all .12s;white-space:nowrap}

.btn-gold{background:var(--gold);color:#1a2424;border-color:rgba(0,0,0,0.2);font-weight:700}.btn-gold:hover{background:#e0dfce}
.btn-amber{background:var(--amber);color:#fff;border-color:var(--amber)}.btn-amber:hover{background:#9a5e1e}

.table-wrap{overflow-x:auto}
table.dtable{width:100%;border-collapse:collapse;font-size:15px}
table.dtable th{text-align:left;padding:11px 14px;border-bottom:2px solid var(--teal-md);font-size:14px;color:var(--text-sub);font-weight:700;background:#f4f7f4;white-space:nowrap}
table.dtable td{padding:11px 14px;border-bottom:1px solid var(--border);vertical-align:middle}
table.dtable tr:last-child td{border-bottom:none}
table.dtable tr:hover td{background:#f7faf7}
.stat-card{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:20px 22px}
.stat-label{font-size:14px;color:var(--text-sub);margin-bottom:6px;font-weight:600}
.stat-value{font-size:28px;font-weight:700}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:9px}
.bar-label{width:66px;text-align:right;font-size:14px;color:var(--text-sub);flex-shrink:0;font-weight:600}
.bar-track{flex:1;background:#e8eeee;border-radius:4px;height:18px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;transition:width .5s}
.bar-val{width:44px;font-size:13px;color:var(--text-muted)}
.flex{display:flex}.items-center{align-items:center}.justify-between{justify-content:space-between}
.gap-6{gap:6px}.gap-8{gap:8px}.gap-12{gap:12px}
.mt-8{margin-top:8px}.mt-12{margin-top:12px}.mt-16{margin-top:16px}
.mb-8{margin-bottom:8px}.mb-12{margin-bottom:12px}.mb-16{margin-bottom:16px}
.text-muted{color:var(--text-muted)}.w-full{width:100%}
.section-title{font-size:17px;font-weight:700;margin-bottom:16px;color:var(--teal)}
.divider{border:none;border-top:1px solid var(--border);margin:16px 0}
.bl-item{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border)}
.bl-item:last-child{border-bottom:none}
.row-actions{display:flex;gap:5px;flex-wrap:wrap}
.toast{position:fixed;bottom:24px;right:24px;background:var(--teal);color:#fff;padding:12px 22px;border-radius:10px;font-size:15px;font-family:inherit;z-index:9999;display:none;max-width:380px;font-weight:500;box-shadow:0 4px 16px rgba(47,79,79,.25)}
.toast.show{display:block}
#loading-screen{position:fixed;inset:0;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;gap:18px}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:42px;height:42px;border:4px solid var(--teal-md);border-top-color:var(--teal);border-radius:50%;animation:spin .8s linear infinite}
</style>
</head>

<script>
// ══════════════════════════════════════════════════════════════════
// CONFIG
// ══════════════════════════════════════════════════════════════════
var COMPUTERS   = [1,2,3,4];
var OPEN=9, CLOSE=17, MAX_SLOTS=4;
var ADMIN_PASS  = 'admin1234';   // ★ 改成你的密碼
var COMP_COLORS = ['#2F4F4F','#018948','#BC7527','#DAA520'];
var CHIP_CLS    = ['chip-c1','chip-c2','chip-c3','chip-c4'];

var TW_HOLIDAYS = {
  '2025-01-01':1,'2025-01-27':1,'2025-01-28':1,'2025-01-29':1,'2025-01-30':1,'2025-01-31':1,
  '2025-02-28':1,'2025-04-04':1,'2025-04-05':1,'2025-04-06':1,'2025-05-01':1,
  '2025-05-30':1,'2025-05-31':1,'2025-06-07':1,'2025-06-08':1,'2025-09-29':1,'2025-10-10':1,
  '2026-01-01':1,'2026-01-26':1,'2026-02-16':1,'2026-02-17':1,'2026-02-18':1,
  '2026-02-19':1,'2026-02-20':1,'2026-02-28':1,'2026-04-04':1,'2026-04-05':1,'2026-04-06':1,
  '2026-04-30':1,'2026-05-01':1,'2026-06-19':1,'2026-06-20':1,
  '2026-09-24':1,'2026-09-25':1,'2026-10-09':1,'2026-10-10':1,
  '2027-01-01':1,'2027-02-05':1,'2027-02-06':1,'2027-02-07':1,'2027-02-08':1,'2027-02-09':1,
  '2027-02-28':1,'2027-04-03':1,'2027-04-04':1,'2027-04-05':1,'2027-05-01':1,
  '2027-06-09':1,'2027-10-01':1,'2027-10-10':1
};

function genSlots(){
  var s=[];
  for(var h=OPEN;h<CLOSE;h++){
    s.push((h<10?'0':'')+h+':00');
    s.push((h<10?'0':'')+h+':30');
  }
  return s;
}
var SLOTS = genSlots();

// ══════════════════════════════════════════════════════════════════
// STATE — 先建好，Firebase onValue 隨時可以寫入
// ══════════════════════════════════════════════════════════════════
var S = {
  tab:'reserve', isAdmin:false,
  weekStart:null,
  modal:null, pickedComp:null,
  form:{ dept:'', name:'', phone:'', email:'', note:'', _dur:1 },
  bookings:[], trash:[], closedDates:{}, blacklist:{}, absCount:{},
  noticeLines:[
    '📌 <b>開放時間</b>：週一至週五 09:00–17:00',
    '⏱️ <b>每次最多預約 2 小時</b>（以 30 分鐘為單位）',
    '🔄 若後續時段無人預約，可向工作人員辦理<b>現場續借</b>',
    '🚫 累積 <b>3 次預約未到</b>將列入黑名單，停止預約資格',
    '🔑 <b>取消預約</b>：查詢後輸入登記<b>電子信箱</b>驗證即可',
    '📞 <b>問題諮詢</b>：分機 <b>#10749</b>',
    '📧 <a href="mailto:18118@hosp.nycu.edu.tw" style="color:var(--teal);font-weight:600">18118@hosp.nycu.edu.tw</a>'
  ],
  adminTab:'bookings', adminFilter:{ date:'', computer:'', status:'' },
  rFrom:'', rTo:'', qPhone:'', qResult:null
};

// ══════════════════════════════════════════════════════════════════
// FIREBASE INIT
// ══════════════════════════════════════════════════════════════════
var firebaseConfig = {
  apiKey:            "AIzaSyA5aw1b8kV_aADZkGr6U_aobftl-uolxbw",
  authDomain:        "pcbooking-d2b7b.firebaseapp.com",
  databaseURL:       "https://pcbooking-d2b7b-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:         "pcbooking-d2b7b",
  storageBucket:     "pcbooking-d2b7b.firebasestorage.app",
  messagingSenderId: "19266335042",
  appId:             "1:19266335042:web:8b55414c1ab4b61e8ad8db"
};
firebase.initializeApp(firebaseConfig);
var DB = firebase.database();

function safeKey(p){ return p.replace(/[.#$[\]]/g,'_'); }

// Firebase write helpers
function fbAddBooking(data){
  var r = DB.ref('bookings').push();
  return r.set(data).then(function(){ return r.key; });
}
function fbUpdate(id,patch){ return DB.ref('bookings/'+id).update(patch); }
function fbDelete(id){
  // 軟刪除：移到 trash 節點，保留 30 天
  return DB.ref('bookings/'+id).once('value').then(function(snap){
    var data=snap.val(); if(!data) return;
    data._deletedAt=new Date().toISOString();
    return DB.ref('trash/'+id).set(data).then(function(){
      return DB.ref('bookings/'+id).remove();
    });
  });
}
function fbRestore(id){
  return DB.ref('trash/'+id).once('value').then(function(snap){
    var data=snap.val(); if(!data) return;
    delete data._deletedAt;
    return DB.ref('bookings/'+id).set(data).then(function(){
      return DB.ref('trash/'+id).remove();
    });
  });
}
function fbAddClosed(d)    { return DB.ref('closedDates/'+d).set(true); }
function fbDelClosed(d)    { return DB.ref('closedDates/'+d).remove(); }
function fbAddBL(key,info){
  return DB.ref('blacklist/'+safeKey(key)).set(info);
}
function fbDelBL(key){ return DB.ref('blacklist/'+safeKey(key)).remove(); }
function fbUpdateAbs(phone,count){
  return DB.ref('absCount/'+safeKey(phone)).set({phone:phone,count:count});
}

// ══════════════════════════════════════════════════════════════════
// REALTIME LISTENERS
// ══════════════════════════════════════════════════════════════════
DB.ref('bookings').on('value', function(snap){
  var data = snap.val() || {};
  S.bookings = Object.keys(data).map(function(k){ return Object.assign({id:k}, data[k]); });
  if(window._appReady) renderMain();
});
DB.ref('closedDates').on('value', function(snap){
  S.closedDates = snap.val() || {};
  if(window._appReady) renderMain();
});
DB.ref('blacklist').on('value', function(snap){
  var data = snap.val() || {};
  S.blacklist = {};
  Object.keys(data).forEach(function(k){
    var v=data[k];
    if(v&&v.name&&v.dept){ S.blacklist[(v.name+'|'+v.dept).toLowerCase()]=v; }
    else if(v&&v.phone){ S.blacklist[v.phone]=v; }
  });
  if(window._appReady) renderMain();
});
DB.ref('absCount').on('value', function(snap){
  var data = snap.val() || {};
  S.absCount = {};
  Object.keys(data).forEach(function(k){
    var v=data[k]; if(v&&v.phone) S.absCount[v.phone]=v.count;
  });
});

// Start after initial load of 3 key nodes
var _loaded=0;
function _checkReady(){ if(++_loaded>=3) startApp(); }
DB.ref('trash').on('value', function(snap){
  var data=snap.val()||{};
  S.trash=Object.keys(data).map(function(k){ return Object.assign({id:k},data[k]); });
  // 自動清除超過30天的
  var now=Date.now();
  Object.keys(data).forEach(function(k){
    if(data[k]._deletedAt){
      var age=now-new Date(data[k]._deletedAt).getTime();
      if(age>30*24*3600*1000) DB.ref('trash/'+k).remove();
    }
  });
  if(window._appReady&&S.adminTab==='bookings') renderMain();
});
DB.ref('bookings').once('value',    function(){ _checkReady(); });
DB.ref('closedDates').once('value', function(){ _checkReady(); });
DB.ref('blacklist').once('value',   function(){ _checkReady(); });
// 載入使用說明設定
DB.ref('settings/noticeLines').on('value', function(snap){
  var data=snap.val();
  if(data&&Array.isArray(data)&&data.length>0) S.noticeLines=data;
  if(window._appReady) renderMain();
});

// ══════════════════════════════════════════════════════════════════
// DATE / SLOT UTILS
// ══════════════════════════════════════════════════════════════════
function today(){ return new Date().toISOString().slice(0,10); }
function toStr(d){ var dd=new Date(d); return dd.toISOString().slice(0,10); }
function getMonday(d){
  var dd=new Date(d), day=dd.getDay();
  dd.setDate(dd.getDate()-day+(day===0?-6:1)); return dd;
}
function addDays(d,n){ var dd=new Date(d); dd.setDate(dd.getDate()+n); return dd; }
function fDate(s){ if(!s)return''; var p=s.split('-'); return p[0]+'/'+p[1]+'/'+p[2]; }
function fShort(s){ if(!s)return''; var p=s.split('-'); return p[1]+'/'+p[2]; }
function wdName(s){ return['日','一','二','三','四','五','六'][new Date(s+'T12:00').getDay()]; }
function isWeekend(s){ var w=new Date(s+'T12:00').getDay(); return w===0||w===6; }
function isHoliday(s){ return !!TW_HOLIDAYS[s]; }
function isClosed(s){ return !!S.closedDates[s]||isWeekend(s)||isHoliday(s); }
function isPastDate(s){ return s<today(); }
function slotMin(s){ var p=s.split(':'); return parseInt(p[0])*60+parseInt(p[1]); }
function toArr(slots){
  // Firebase可能把array存成object {0:'09:00',1:'09:30'}，統一轉回array
  if(Array.isArray(slots)) return slots;
  return Object.keys(slots).sort(function(a,b){return+a-+b;}).map(function(k){return slots[k];});
}
function endTime(slots){
  var so=toArr(slots).slice().sort();
  var em=slotMin(so[so.length-1])+30;
  var hh=em/60|0; var mm=em%60;
  return (hh<10?'0':'')+hh+':'+(mm===0?'00':'30');
}
function nextId(){ return 'B'+Date.now().toString(36).toUpperCase(); }

function toast(msg,ms){
  ms=ms||2800;
  var t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(t._t); t._t=setTimeout(function(){ t.classList.remove('show'); },ms);
}
function closeModal(){
  document.getElementById('modal-area').innerHTML='';
  S.modal=null; S.pickedComp=null;
}

// BOOKING HELPERS
// ══════════════════════════════════════════════════════════════════
function dayCompBks(date,comp){
  return S.bookings.filter(function(b){
    return b.date===date&&b.computer===comp&&b.status!=='cancelled';
  });
}
function bookedSet(date,comp){
  var s={};
  dayCompBks(date,comp).forEach(function(b){ toArr(b.slots).forEach(function(sl){ s[sl]=1; }); });
  return s;
}
function getSlotBk(date,comp,slot){
  return dayCompBks(date,comp).find(function(b){ return toArr(b.slots).indexOf(slot)>=0; });
}

}

    +'<div class="flex items-center gap-8">'
    +'<button class="btn btn-sm" onclick="weekNav(-1)">&#8249; 上週</button>'

    +'<input type="date" style="width:170px" onchange="jumpToDate(this.value)">'
    +'</div></div>'
    +legend
    +'<div class="week-grid-wrap"><table class="week-grid"><thead><tr>'
    +'<th style="width:66px">時段</th>';

  days.forEach(function(d){
    var isToday=d===todayStr;
    var sub='';
    if(isHoliday(d))       sub='<br><span class="badge badge-red" style="font-size:11px">國定假日</span>';
    else if(S.closedDates[d]) sub='<br><span class="badge badge-gray" style="font-size:11px">休館</span>';
    else if(isWeekend(d))  sub='<br><span class="badge badge-gray" style="font-size:11px">週末</span>';
    html+='<th'+(isToday?' class="today-h"':'')+'>'+fShort(d)+' ('+wdName(d)+')'+sub+'</th>';
  });
  html+='</tr></thead><tbody>';

  SLOTS.forEach(function(slot){
    html+='<tr><td class="time-cell">'+slot+'</td>';
    days.forEach(function(d){
      var closed=isClosed(d), pastDate=isPastDate(d);
      var nowMin=new Date().getHours()*60+new Date().getMinutes();
      var pastSlot=d===todayStr&&slotMin(slot)<nowMin;
      var notAvail=closed||pastDate||pastSlot;
      var chips='';
      if(!notAvail){
        COMPUTERS.forEach(function(c){
          var bk=getSlotBk(d,c,slot);
          if(bk){

              +'</div>';
          }

    +'<div class="section-title">查詢 / 取消我的預約</div>'

function renderQueryResult(){
  if(S.qResult===null) return '';
  if(!S.qResult.length) return '<p style="color:var(--text-muted);font-size:15px;padding:8px 0">查無預約紀錄</p>';
  var html='<div class="table-wrap"><table class="dtable"><thead><tr>'
    +'<th>日期</th><th>電腦</th><th>時段</th><th>單位／姓名</th><th>說明</th><th>狀態</th><th>操作</th>'
    +'</tr></thead><tbody>';
  var sorted=S.qResult.slice().sort(function(a,b){ return b.date.localeCompare(a.date); }); sorted.forEach(function(b){ b.slots=toArr(b.slots); });
  sorted.forEach(function(b){
    var st=b.status==='arrived' ?'<span class="badge badge-green">已到</span>'
          :b.status==='absent'  ?'<span class="badge badge-red">未到</span>'
          :b.status==='cancelled'?'<span class="badge badge-gray">已取消</span>'
          :'<span class="badge badge-teal">已預約</span>';
    var canCancel=b.status==='confirmed'&&b.date>=today();
    var cancelBtn=canCancel
      ?'<button class="btn btn-xs btn-danger" data-bid="'+b.id+'" onclick="userCancelFlow(this)">取消預約</button>'
      :'';
    html+='<tr>'
      +'<td><b>'+fDate(b.date)+'</b></td>'
      +'<td>電腦 '+b.computer+'</td>'
      +'<td style="white-space:nowrap;font-size:14px">'+toArr(b.slots)[0]+'–'+endTime(b.slots)+'</td>'
      +'<td style="font-size:13px">'+b.dept+'<br><b>'+b.name+'</b></td>'
      +'<td style="color:var(--text-muted);font-size:13px;max-width:120px">'+(b.note||'—')+'</td>'
      +'<td>'+st+'</td>'
      +'<td>'+cancelBtn+'</td>'
      +'</tr>';
  });
  html+='</tbody></table></div>';
  if(S.blacklist[S.qPhone])
    html+='<p style="color:var(--red);margin-top:10px;font-size:14px;font-weight:600">⚠️ 此帳號已列入黑名單，無法進行新預約</p>';
  return html;
}

function queryMy(){
  var p=document.getElementById('q-phone')?document.getElementById('q-phone').value.trim():'';

function userCancelFlow(btn){
  var id=btn.dataset.bid;
  var b=S.bookings.find(function(bk){ return bk.id===id; });
  var storedEmail=b?b.email:'';
  var html='<div class="modal-bg" onclick="if(event.target===this)closeModal()">'
    +'<div class="modal" style="width:400px">'
    +'<div class="modal-title">取消預約</div>'
    +'<div style="background:var(--teal-lt);border:1.5px solid var(--teal-md);border-radius:10px;padding:14px 16px;margin-bottom:18px;font-size:14px;color:var(--text-sub);line-height:1.9">'
    +'請輸入預約時填寫的<b>電子信箱</b>進行身份驗證'
    +'</div>'
    +'<div class="field"><label>電子信箱</label>'
    +'<input id="cc-input" type="email" placeholder="your@email.com"'
    +' style="font-size:16px;padding:12px">'
    +'</div>'
    +'<div id="cc-err" style="color:var(--red);font-size:14px;min-height:20px;margin-bottom:8px"></div>'
    +'<div class="flex gap-8">'
    +'<button class="btn btn-danger w-full" style="justify-content:center;font-size:15px" id="cc-ok">確認取消</button>'
    +'<button class="btn w-full" style="justify-content:center;font-size:15px" onclick="closeModal()">返回</button>'
    +'</div></div></div>';
  document.getElementById('modal-area').innerHTML=html;
  var inp=document.getElementById('cc-input');
  var errEl=document.getElementById('cc-err');
  if(inp) inp.focus();
  function doCancel(){
    var v=(inp?inp.value:'').trim().toLowerCase();
    if(!v){ errEl.textContent='請輸入電子信箱'; return; }
    if(v!==String(storedEmail).toLowerCase()){ errEl.textContent='❌ 信箱不符，請確認後再試'; inp.value=''; inp.focus(); return; }
    var bk=S.bookings.find(function(bk){ return bk.id===id; });
    if(!bk){ toast('找不到此筆預約'); return; }
    bk.status='cancelled';
    fbUpdate(id,{status:'cancelled'});
    closeModal();
    S.qResult=S.bookings.filter(function(bk){ return bk.phone===S.qPhone; });
    document.getElementById('q-result').innerHTML=renderQueryResult();
    toast('✅ 預約已取消');
  }
  if(inp) inp.addEventListener('keydown',function(e){ if(e.key==='Enter') doCancel(); });
  document.getElementById('cc-ok').addEventListener('click', doCancel);
}

function openModal(date, startSlot){
  S.modal={date:date, startSlot:startSlot};
  S.pickedComp=null;
  S.form={dept:'',name:'',phone:'',ext:'',note:'',_dur:1};
  renderModalHTML();
}
function renderModalHTML(){
  if(!S.modal) return;
  var date=S.modal.date, startSlot=S.modal.startSlot;
  var si=SLOTS.indexOf(startSlot);

  // Computer cards
  var compHtml='<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:6px">';
  COMPUTERS.forEach(function(c){
    var bs=bookedSet(date,c);
    var avail=0;
    for(var i=si;i<SLOTS.length;i++){ if(!bs[SLOTS[i]]) avail++; else break; }
    avail=Math.min(avail,MAX_SLOTS);
    var sel=S.pickedComp===c, disabled=avail===0;
    var label=disabled?'已滿':'最多 '+(avail*0.5).toFixed(1)+'h';
    var border=sel?COMP_COLORS[c-1]:'var(--border-md)';
    var bg=sel?COMP_COLORS[c-1]+'22':'#fff';
    compHtml+='<div'+(disabled?'':' onclick="pickComp('+c+')"')
      +' style="border:2px solid '+border+';background:'+bg
      +';border-radius:10px;padding:13px 6px;text-align:center'
      +';cursor:'+(disabled?'not-allowed':'pointer')
      +';opacity:'+(disabled?'0.4':'1')+';transition:all .12s">'
      +'<div style="font-size:15px;font-weight:700;color:'+COMP_COLORS[c-1]+'">電腦 '+c+'</div>'
      +'<div style="font-size:13px;color:var(--text-muted);margin-top:3px">'+label+'</div>'
      +'</div>';
  });
  compHtml+='</div>';

  // Duration buttons
  var durHtml='';
  if(S.pickedComp!==null){
    var bs2=bookedSet(date,S.pickedComp);
    var maxA=0;
    for(var i=si;i<SLOTS.length;i++){ if(!bs2[SLOTS[i]]) maxA++; else break; }
    maxA=Math.min(maxA,MAX_SLOTS);
    var cur=S.form._dur||1;
    var preview=SLOTS.slice(si,si+cur);
    var btnRow='';
    for(var n=1;n<=maxA;n++){
      btnRow+='<button class="btn btn-sm'+(cur===n?' btn-gold':'')+'" onclick="pickDur('+n+')">'+(n*0.5).toFixed(1)+' 小時</button>';
    }
    durHtml='<div class="field"><label>使用時間</label>'
      +'<div class="flex gap-8" style="flex-wrap:wrap">'+btnRow+'</div>'
      +'<div style="margin-top:10px;padding:10px 14px;background:var(--teal-lt);border-radius:8px;font-size:15px;color:var(--teal);font-weight:600">'
      +'預約時段：'+preview[0]+' – '+endTime(preview)
      +'</div></div>';
  }

  var html='<div class="modal-bg" onclick="if(event.target===this)closeModal()">'
    +'<div class="modal">'
    +'<div class="modal-title">新增預約 — '+fDate(date)+' '+startSlot+'</div>'
    +'<div class="field"><label>選擇電腦</label>'+compHtml+'</div>'
    +durHtml
    +'<hr class="divider">'
    +'<div class="field"><label>單位 <span style="color:var(--red)">*</span></label>'
    +'<input id="m-dept" placeholder="如：資訊組" value="'+S.form.dept+'" oninput="S.form.dept=this.value"></div>'
    +'<div class="field"><label>姓名 <span style="color:var(--red)">*</span></label>'
    +'<input id="m-name" placeholder="請輸入姓名" value="'+S.form.name+'" oninput="S.form.name=this.value"></div>'
    +'<div class="field"><label>聯絡電話／分機 <span style="color:var(--red)">*</span></label>'
    +'<input id="m-phone" type="tel" placeholder="0912-345-678 或 #1234" value="'+S.form.phone+'" oninput="S.form.phone=this.value"></div>'
    +'<div class="field"><label>電子信箱 <span style="color:var(--red)">*</span></label>'
    +'<input id="m-email" type="email" placeholder="your@email.com" oninput="S.form.email=this.value"></div>'
    +'<div class="field"><label>備註</label>'
    +'<input id="m-note" placeholder="" value="'+S.form.note+'" oninput="S.form.note=this.value"></div>'
    +'<div class="flex gap-8 mt-12">'
    +'<button class="btn btn-primary w-full" style="justify-content:center;font-size:16px" onclick="submitBooking()">確認預約</button>'
    +'<button class="btn w-full" style="justify-content:center;font-size:16px" onclick="closeModal()">取消</button>'
    +'</div></div></div>';
  document.getElementById('modal-area').innerHTML=html;
}

function pickComp(c){ S.pickedComp=c; S.form._dur=1; renderModalHTML(); }
function pickDur(n){ S.form._dur=n; renderModalHTML(); }

function submitBooking(){
  var dept =(document.getElementById('m-dept') ?document.getElementById('m-dept').value.trim() :S.form.dept);
  var name =(document.getElementById('m-name') ?document.getElementById('m-name').value.trim() :S.form.name);
  var phone=(document.getElementById('m-phone')?document.getElementById('m-phone').value.trim():S.form.phone);
  var email=(document.getElementById('m-email')?document.getElementById('m-email').value.trim():S.form.email);
  var note =(document.getElementById('m-note') ?document.getElementById('m-note').value.trim() :S.form.note);
  if(!dept) { toast('請填寫單位');   return; }
  if(!name) { toast('請填寫姓名');   return; }
  if(!phone){ toast('請填寫電話');   return; }
  if(!email||email.indexOf('@')<0){ toast('請填寫正確的電子信箱'); return; }
  if(S.pickedComp===null){ toast('請選擇電腦'); return; }
  if(!S.form._dur){ toast('請選擇使用時間'); return; }
  var blKey=(name+'|'+dept).toLowerCase();
  if(S.blacklist[blKey]){ toast('⚠️ 此姓名／單位已列入黑名單，無法預約'); return; }
  var si=SLOTS.indexOf(S.modal.startSlot);
  var slots=SLOTS.slice(si,si+S.form._dur);
  var bs=bookedSet(S.modal.date,S.pickedComp);
  for(var i=0;i<slots.length;i++){ if(bs[slots[i]]){ toast('部分時段已被預約，請重新選擇'); return; } }
  var bData={
    date:S.modal.date, computer:S.pickedComp, slots:slots,
    dept:dept, name:name, phone:phone, email:email, note:note,
    status:'confirmed', createdAt:new Date().toISOString()
  };
  fbAddBooking(bData).then(function(newId){
    bData.id=newId;
    document.getElementById('modal-area').innerHTML='';
    S.modal=null; S.pickedComp=null;
    sendBookingNotify(bData, slots); // 通知信
    renderMain();
    showSuccessOverlay(name, bData.computer, slots, bData);
  }).catch(function(e){ toast('❌ 儲存失敗：'+e.message); });
}

function closeSuccessOv(){
  var el=document.getElementById('success-ov'); if(el) el.remove();
}
function copyCode(code){
  function done(){ var b=document.getElementById('cpbtn'); if(b){ b.textContent='✅ 已複製！'; b.style.color='var(--green)'; } }
  if(navigator.clipboard){ navigator.clipboard.writeText(code).then(done).catch(done); }
  else{
    var ta=document.createElement('textarea'); ta.value=code;
    document.body.appendChild(ta); ta.select(); document.execCommand('copy');
    document.body.removeChild(ta); done();
  }
}
function printSlip(slipId){
  var el=document.getElementById(slipId); if(!el) return;
  var w=window.open('','_blank');
  if(!w){ toast('請允許彈出視窗以列印'); return; }
  w.document.write('<!DOCTYPE html><html lang="zh-TW"><head><meta charset="UTF-8">'
    +'<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;600;700&display=swap" rel="stylesheet">'
    +'<title>預約確認單</title>'
    +'<style>body{font-family:"Noto Sans TC",sans-serif;padding:32px;max-width:420px;margin:0 auto}'
    +'.box{border:2px solid #2F4F4F;border-radius:10px;padding:20px}'
    +'table{width:100%;border-collapse:collapse;font-size:14px}'
    +'td{padding:5px 0}td:first-child{color:#555;font-weight:600;width:70px}'
    +'.cb{margin-top:16px;padding:14px;background:#fef5e6;border:2px dashed #BC7527;border-radius:8px;text-align:center}'
    +'.cl{font-size:12px;color:#BC7527;font-weight:700;margin-bottom:4px}'
    +'.cc{font-size:38px;font-weight:700;color:#2F4F4F;letter-spacing:12px}'
    +'.cn{font-size:11px;color:#888;margin-top:4px}'
    +'@media print{body{padding:0}}</style></head><body>'
    +'<div class="box">'+el.innerHTML+'</div>'
    +'<script>window.onload=function(){window.print();}<\/script>'
    +'</body></html>');
  w.document.close();
}

    +'<option value="">全部</option>'

    +'<option value="arrived"'+(af.status==='arrived'?' selected':'')+'>已到</option>'
    +'<option value="absent"'+(af.status==='absent'?' selected':'')+'>未到</option>'
    +'<option value="cancelled"'+(af.status==='cancelled'?' selected':'')+'>已取消</option>'
    +'</select></div></div>'

    +'<span style="font-size:14px;color:var(--text-muted)">共 '+f.length+' 筆</span>'
    +'<button class="btn btn-sm" onclick="S.adminFilter={date:\'\',computer:\'\',status:\'\'};renderMain()">清除篩選</button>'
    +'</div></div>'

    +'<table class="dtable"><thead><tr>'
    +'<th>日期</th><th>電腦</th><th>時段</th><th>單位</th><th>姓名</th><th>電話</th><th>信箱</th><th>說明</th><th>狀態</th><th>操作</th>'
    +'</tr></thead><tbody>';

                 :b.status==='absent'  ?'<span class="badge badge-red">未到</span>'
                 :b.status==='cancelled'?'<span class="badge badge-gray">取消</span>'
                 :'<span class="badge badge-teal">已預約</span>';
      var blkKey2=(b.name+'|'+b.dept).toLowerCase();
      var isBlk=(S.blacklist[blkKey2]||S.blacklist[b.phone])?'<span class="badge badge-red" style="margin-left:5px">黑</span>':'';

        if(b.status!=='absent')  acts+='<button class="btn btn-xs btn-red" data-id="'+b.id+'" data-st="absent" onclick="markSt(this)">未到</button>';
        acts+='<button class="btn btn-xs" data-id="'+b.id+'" data-st="cancelled" onclick="markSt(this)">取消</button>';

function markSt(btn){
  var id=btn.dataset.id, status=btn.dataset.st;
  var b=S.bookings.find(function(bk){ return bk.id===id; });
  if(!b) return;
  b.status=status;
  if(status==='absent'){
    S.absCount[b.phone]=(S.absCount[b.phone]||0)+1;
    fbUpdateAbs(b.phone, S.absCount[b.phone]);
    var blk=(b.name+'|'+b.dept).toLowerCase();
    if(S.absCount[b.phone]>=3&&!S.blacklist[blk]){
      var info={name:b.name,dept:b.dept,phone:b.phone,count:S.absCount[b.phone]};
      S.blacklist[blk]=info;
      fbAddBL(blk,info);
      toast('⚠️ '+b.name+'（'+b.dept+'）累積 3 次未到，已自動列入黑名單');
    }
  }
  fbUpdate(id,{status:status});
  renderMain();
}

  var id=btn.dataset.id, cur=btn.dataset.note||'';
  document.getElementById('modal-area').innerHTML=
    '<div class="modal-bg" onclick="if(event.target===this)closeModal()">'

    '<div class="modal-bg" onclick="if(event.target===this)closeModal()">'
    +'<div class="modal" style="width:380px">'

    +'<p style="font-size:15px;color:var(--text-sub);margin-bottom:20px">此筆預約將移至回收桶，<b>30 天內</b>可從「資源回收桶」還原。</p>'
    +'<div class="flex gap-8">'

function confirmDelete(btn){

    closeModal(); toast('已刪除，可從回收桶還原（30 天內）'); renderMain();
  }).catch(function(e){ toast('刪除失敗：'+e.message); });

function renderAdminTrash(){
  var list=(S.trash||[]).slice().sort(function(a,b){ return (b._deletedAt||'').localeCompare(a._deletedAt||''); });
  var rows=list.length?list.map(function(b){
    var del=b._deletedAt?new Date(b._deletedAt).toLocaleDateString('zh-TW'):'—';
    var expire=b._deletedAt?new Date(new Date(b._deletedAt).getTime()+30*24*3600*1000).toLocaleDateString('zh-TW'):'—';
    return '<tr>'
      +'<td>'+del+'</td>'
      +'<td>'+fDate(b.date)+'</td><td>電腦 '+b.computer+'</td>'
      +'<td style="white-space:nowrap">'+toArr(b.slots)[0]+'–'+endTime(b.slots)+'</td>'
      +'<td>'+b.dept+'</td><td style="font-weight:600">'+b.name+'</td>'
      +'<td style="font-size:13px;color:var(--text-muted)">'+(b.note||'—')+'</td>'
      +'<td style="font-size:13px;color:var(--red)">'+expire+'</td>'
      +'<td style="white-space:nowrap"><button class="btn btn-xs btn-green" data-id="'+b.id+'" onclick="restoreBooking(this)">還原</button> <button class="btn btn-xs btn-danger" data-id="'+b.id+'" onclick="permDeleteOne(this)">永久刪除</button></td>'
      +'</tr>';
  }).join('')
  :'<tr><td colspan="9" style="text-align:center;padding:24px;color:var(--text-muted)">回收桶為空</td></tr>';

  var clearBtn=list.length?'<button class="btn btn-sm btn-danger" onclick="clearTrash()">🗑️ 清除全部（永久刪除）</button>':'';
  return '<div class="card">'
    +'<div class="flex items-center justify-between mb-8"><div class="section-title" style="margin-bottom:0">🗑️ 資源回收桶（'+list.length+' 筆，保留 30 天）</div>'+clearBtn+'</div>'
    +'<p style="font-size:14px;color:var(--text-muted);margin-bottom:14px">已刪除的預約可在此還原，超過 30 天將自動永久刪除。</p>'
    +'<div class="table-wrap"><table class="dtable"><thead><tr>'
    +'<th>刪除日</th><th>預約日</th><th>電腦</th><th>時段</th><th>單位</th><th>姓名</th><th>說明</th><th>到期日</th><th>操作</th>'
    +'</tr></thead><tbody>'+rows+'</tbody></table></div></div>';
}
function clearTrash(){
  if(!confirm('確定要永久刪除回收桶中所有 '+((S.trash||[]).length)+' 筆紀錄？此動作無法復原。')) return;
  var ids=(S.trash||[]).map(function(b){ return b.id; });
  var promises=ids.map(function(id){ return DB.ref('trash/'+id).remove(); });
  Promise.all(promises).then(function(){
    S.trash=[]; toast('✅ 回收桶已清空'); renderMain();
  }).catch(function(e){ toast('清除失敗：'+e.message); });
}
function restoreBooking(btn){
  var id=btn.dataset.id;
  fbRestore(id).then(function(){
    toast('✅ 預約已還原'); renderMain();
  }).catch(function(e){ toast('還原失敗：'+e.message); });
}
function permDeleteOne(btn){
  var id=btn.dataset.id;
  if(!confirm('確定要永久刪除此筆紀錄？無法復原。')) return;
  DB.ref('trash/'+id).remove().then(function(){
    S.trash=(S.trash||[]).filter(function(b){ return b.id!==id; });
    toast('已永久刪除'); renderMain();
  }).catch(function(e){ toast('刪除失敗：'+e.message); });
}

  closeModal(); toast('說明已更新'); renderMain();
}

function addBL(){
  var p=document.getElementById('bl-phone')?document.getElementById('bl-phone').value.trim():'';
  var n=document.getElementById('bl-name')?document.getElementById('bl-name').value.trim():'';
  var d=document.getElementById('bl-dept')?document.getElementById('bl-dept').value.trim():'';
  if(!n||!d){ toast('請填寫姓名和單位（黑名單以姓名＋單位判斷）'); return; }
  var blk=(n+'|'+d).toLowerCase();
  var info={name:n,dept:d,phone:p||'',count:0};
  S.blacklist[blk]=info; fbAddBL(blk,info);
  toast('已加入黑名單'); renderMain();
}
function removeBL(btn){
  var blk=btn.dataset.blk;
  delete S.blacklist[blk]; fbDelBL(blk);
  renderMain(); toast('已解除黑名單');
}

// ══════════════════════════════════════════════════════════════════
// REPORT
// ══════════════════════════════════════════════════════════════════
function stLabel(s){ return s==='arrived'?'已到':s==='absent'?'未到':s==='cancelled'?'取消':'已預約'; }

function renderNoticeLines(){
  return S.noticeLines.map(function(l){ return '<div>'+l+'</div>'; }).join('');
}

function openEditNotice(){
  var text=S.noticeLines.join('\n');
  document.getElementById('modal-area').innerHTML=
    '<div class="modal-bg" onclick="if(event.target===this)closeModal()">'
    +'<div class="modal" style="width:540px">'
    +'<div class="modal-title">✏️ 編輯使用說明</div>'
    +'<p style="font-size:13px;color:var(--text-muted);margin-bottom:10px">每行一條說明，支援 &lt;b&gt; 粗體與 &lt;a&gt; 連結</p>'
    +'<div class="field">'
    +'<textarea id="notice-edit" rows="10" style="font-size:14px;resize:vertical;font-family:inherit">'+text.replace(/</g,'&lt;').replace(/>/g,'&gt;')+'</textarea>'
    +'</div>'
    +'<div class="flex gap-8 mt-8">'
    +'<button class="btn btn-primary w-full" style="justify-content:center" onclick="saveNotice()">儲存</button>'
    +'<button class="btn w-full" style="justify-content:center" onclick="closeModal()">取消</button>'
    +'</div></div></div>';
  setTimeout(function(){ var el=document.getElementById('notice-edit'); if(el) el.focus(); },80);
}

function saveNotice(){
  var raw=document.getElementById('notice-edit')?document.getElementById('notice-edit').value:'';
  // unescape &lt; &gt; back to < >
  raw=raw.replace(/&lt;/g,'<').replace(/&gt;/g,'>');
  S.noticeLines=raw.split('\n').map(function(l){ return l.trim(); }).filter(function(l){ return l.length>0; });
  // persist to Firebase
  DB.ref('settings/noticeLines').set(S.noticeLines);
  closeModal(); renderMain(); toast('使用說明已更新');
}

function renderReport(){
  var f=S.bookings.filter(function(b){ return b.status!=='cancelled'; });
  if(S.rFrom) f=f.filter(function(b){ return b.date>=S.rFrom; });
  if(S.rTo)   f=f.filter(function(b){ return b.date<=S.rTo; });
  var total=f.length, totalH=f.reduce(function(s,b){ return s+toArr(b.slots).length*0.5; },0);
  var absent=f.filter(function(b){ return b.status==='absent'; }).length;
  var arrived=f.filter(function(b){ return b.status==='arrived'; }).length;
  var rate=total>0?Math.round(arrived/total*100):0;
  var slotCnt={};
  f.forEach(function(b){ toArr(b.slots).forEach(function(sl){ slotCnt[sl]=(slotCnt[sl]||0)+1; }); });
  var topSlots=Object.keys(slotCnt).map(function(k){ return [k,slotCnt[k]]; }).sort(function(a,b){ return b[1]-a[1]; }).slice(0,5);
  var maxSl=topSlots.length?topSlots[0][1]:1;
  var compH={};
  COMPUTERS.forEach(function(c){ compH[c]=f.filter(function(b){ return b.computer===c; }).reduce(function(s,b){ return s+toArr(b.slots).length*0.5; },0); });
  var maxCH=Math.max.apply(null,COMPUTERS.map(function(c){ return compH[c]; }).concat([1]));

  var html='<div class="card">'
    +'<div class="flex items-center justify-between mb-16">'
    +'<div class="section-title" style="margin-bottom:0">統計報表</div>'
    +'<div class="flex gap-8">'
    +'<button class="btn btn-sm" onclick="exportCSV()">匯出 CSV</button>'
    +'<button class="btn btn-sm btn-amber" onclick="exportXLSX()">匯出 Excel</button>'
    +'<button class="btn btn-sm btn-primary" onclick="printPDF()">匯出 PDF</button>'
    +'</div></div>'
    +'<div class="flex gap-12 items-end flex-wrap">'
    +'<div style="flex:1;min-width:140px"><label>開始日期</label><input type="date" value="'+S.rFrom+'" onchange="S.rFrom=this.value;renderMain()"></div>'
    +'<div style="flex:1;min-width:140px"><label>結束日期</label><input type="date" value="'+S.rTo+'" onchange="S.rTo=this.value;renderMain()"></div>'
    +'<button class="btn btn-sm" onclick="S.rFrom=\'\';S.rTo=\'\';renderMain()">清除</button>'
    +'</div></div>'
    +'<div class="grid-4" style="margin-top:16px">'
    +'<div class="stat-card"><div class="stat-label">總預約筆數</div><div class="stat-value">'+total+'</div></div>'
    +'<div class="stat-card"><div class="stat-label">總使用時數</div><div class="stat-value">'+totalH.toFixed(1)+' h</div></div>'
    +'<div class="stat-card"><div class="stat-label">未到次數</div><div class="stat-value" style="color:var(--red)">'+absent+'</div></div>'
    +'<div class="stat-card"><div class="stat-label">報到率</div><div class="stat-value" style="color:var(--green)">'+rate+'%</div></div>'
    +'</div>';

  var barA=topSlots.map(function(e){ return '<div class="bar-row"><div class="bar-label">'+e[0]+'</div><div class="bar-track"><div class="bar-fill" style="width:'+Math.round(e[1]/maxSl*100)+'%;background:var(--teal)"></div></div><div class="bar-val">'+e[1]+' 次</div></div>'; }).join('');
  var barB=COMPUTERS.map(function(c){ return '<div class="bar-row"><div class="bar-label">電腦 '+c+'</div><div class="bar-track"><div class="bar-fill" style="width:'+Math.round(compH[c]/maxCH*100)+'%;background:'+COMP_COLORS[c-1]+'"></div></div><div class="bar-val">'+compH[c].toFixed(1)+' h</div></div>'; }).join('');
  html+='<div class="grid-2" style="margin-top:16px">'
    +'<div class="card"><div class="section-title">熱門時段 TOP 5</div>'+(barA||'<p style="color:var(--text-muted)">無資料</p>')+'</div>'
    +'<div class="card"><div class="section-title">各電腦使用時數</div>'+barB+'</div>'
    +'</div>';

  var detailRows=COMPUTERS.map(function(c){
    var ab=f.filter(function(b){ return b.computer===c&&b.status==='absent'; }).length;
    return '<tr><td style="font-weight:600">電腦 '+c+'</td><td>'+f.filter(function(b){ return b.computer===c; }).length+'</td><td>'+compH[c].toFixed(1)+' h</td><td>'+ab+'</td></tr>';
  }).join('');
  html+='<div class="card" style="margin-top:16px"><div class="section-title">各電腦明細</div>'
    +'<div class="table-wrap"><table class="dtable"><thead><tr><th>電腦</th><th>預約次數</th><th>使用時數</th><th>未到次數</th></tr></thead><tbody>'+detailRows+'</tbody></table></div></div>';

  var listRows=f.slice().sort(function(a,b){ return b.date.localeCompare(a.date); }).map(function(b){
    return '<tr><td>'+fDate(b.date)+'</td><td>電腦 '+b.computer+'</td><td>'+b.dept+'</td>'
      +'<td style="font-weight:600">'+b.name+'</td><td>'+b.phone+'</td><td>'+(b.ext||'—')+'</td>'
      +'<td style="color:var(--text-muted);font-size:13px">'+(b.note||'—')+'</td>'
      +'<td style="white-space:nowrap">'+toArr(b.slots)[0]+'–'+endTime(b.slots)+'</td>'
      +'<td>'+(toArr(b.slots).length*0.5).toFixed(1)+' h</td><td>'+stLabel(b.status)+'</td></tr>';
  }).join('');
  html+='<div class="card" style="margin-top:16px"><div class="section-title">預約清單（'+f.length+' 筆）</div>'
    +'<div class="table-wrap"><table class="dtable"><thead><tr>'
    +'<th>日期</th><th>電腦</th><th>單位</th><th>姓名</th><th>電話</th><th>信箱</th><th>說明</th><th>時段</th><th>時數</th><th>狀態</th>'
    +'</tr></thead><tbody>'+(listRows||'<tr><td colspan="10" style="text-align:center;padding:24px;color:var(--text-muted)">無資料</td></tr>')+'</tbody></table></div></div>';
  return html;
}

function getExport(){
  var f=S.bookings.slice();
  if(S.rFrom) f=f.filter(function(b){ return b.date>=S.rFrom; });
  if(S.rTo)   f=f.filter(function(b){ return b.date<=S.rTo; });
  return f;
}
function exportCSV(){
  var f=getExport();
  var rows=[['日期','電腦','單位','姓名','電話','信箱','說明','開始','結束','時數','狀態']];
  f.forEach(function(b){ rows.push([fDate(b.date),'電腦'+b.computer,b.dept,b.name,b.phone,b.email||'',b.note||'',toArr(b.slots)[0],endTime(b.slots),(toArr(b.slots).length*0.5).toFixed(1),stLabel(b.status)]); });
  var csv=rows.map(function(r){ return r.map(function(c){ return '"'+String(c).replace(/"/g,'""')+'"'; }).join(','); }).join('\n');
  var a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob(['\uFEFF'+csv],{type:'text/csv'}));
  a.download='預約紀錄_'+today()+'.csv'; a.click();
  toast('CSV 已下載');
}
function exportXLSX(){
  var f=getExport();
  var ws1=[['日期','電腦','單位','姓名','電話','信箱','說明','開始','結束','時數','狀態']];
  f.forEach(function(b){ ws1.push([fDate(b.date),'電腦'+b.computer,b.dept,b.name,b.phone,b.email||'',b.note||'',toArr(b.slots)[0],endTime(b.slots),+(toArr(b.slots).length*0.5).toFixed(1),stLabel(b.status)]); });
  var active=f.filter(function(b){ return b.status!=='cancelled'; });
  var totalH=active.reduce(function(s,b){ return s+toArr(b.slots).length*0.5; },0);
  var ws2=[['項目','數值'],['總筆數',f.length],['總時數',+totalH.toFixed(1)],['未到次數',f.filter(function(b){ return b.status==='absent'; }).length]];
  COMPUTERS.forEach(function(c){ ws2.push(['電腦'+c+'時數',+active.filter(function(b){ return b.computer===c; }).reduce(function(s,b){ return s+toArr(b.slots).length*0.5; },0).toFixed(1)]); });
  var wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(ws1),'預約清單');
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(ws2),'統計摘要');
  XLSX.writeFile(wb,'電腦預約報表_'+today()+'.xlsx');
  toast('Excel 已下載');
}
function printPDF(){
  var f=getExport().filter(function(b){ return b.status!=='cancelled'; });
  var range=S.rFrom||S.rTo?(S.rFrom||'—')+' 至 '+(S.rTo||'—'):'全部';
  var totalH=f.reduce(function(s,b){ return s+toArr(b.slots).length*0.5; },0);
  var absent=f.filter(function(b){ return b.status==='absent'; }).length;
  var arrived=f.filter(function(b){ return b.status==='arrived'; }).length;
  var rate=f.length>0?Math.round(arrived/f.length*100):0;
  var sc={};f.forEach(function(b){ toArr(b.slots).forEach(function(sl){ sc[sl]=(sc[sl]||0)+1; }); });
  var top=Object.keys(sc).map(function(k){ return [k,sc[k]]; }).sort(function(a,b){ return b[1]-a[1]; }).slice(0,5);
  var ch={};COMPUTERS.forEach(function(c){ ch[c]=f.filter(function(b){ return b.computer===c; }).reduce(function(s,b){ return s+toArr(b.slots).length*0.5; },0); });
  var maxCH=Math.max.apply(null,COMPUTERS.map(function(c){ return ch[c]; }).concat([1]));
  var rows=f.slice().sort(function(a,b){ return b.date.localeCompare(a.date); }).map(function(b){
    return '<tr><td>'+fDate(b.date)+'</td><td>電腦'+b.computer+'</td><td>'+b.dept+'</td><td>'+b.name+'</td>'
      +'<td>'+b.phone+'</td><td style="font-size:10px">'+(b.email||'—')+'</td><td>'+(b.note||'—')+'</td>'
      +'<td>'+toArr(b.slots)[0]+'–'+endTime(b.slots)+'</td><td>'+(toArr(b.slots).length*0.5).toFixed(1)+'h</td><td>'+stLabel(b.status)+'</td></tr>';
  }).join('');
  var w=window.open('','_blank');
  if(!w){ toast('請允許彈出視窗以列印'); return; }
  w.document.write('<!DOCTYPE html><html lang="zh-TW"><head><meta charset="UTF-8">'
    +'<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;600;700&display=swap" rel="stylesheet">'
    +'<title>電腦預約報表</title>'
    +'<style>body{font-family:"Noto Sans TC",sans-serif;font-size:12px;color:#1a2424;padding:28px;margin:0}'
    +'h1{font-size:22px;font-weight:700;color:#2F4F4F;margin-bottom:3px}'
    +'.sub{font-size:11px;color:#7a9090;margin-bottom:18px}'
    +'.stats{display:flex;gap:12px;margin-bottom:18px}'
    +'.sc{flex:1;background:#eaf1f1;border-radius:8px;padding:10px 14px}'
    +'.sl{font-size:11px;color:#2F4F4F;font-weight:700}.sv{font-size:20px;font-weight:700;margin-top:2px}'
    +'.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px}'
    +'.st{font-size:13px;font-weight:700;color:#2F4F4F;padding-bottom:5px;border-bottom:2px solid #b0c8c8;margin-bottom:10px}'
    +'.br{display:flex;align-items:center;gap:8px;margin-bottom:5px}'
    +'.bl{width:55px;text-align:right;font-size:11px;color:#3d5555;font-weight:600}'
    +'.bt{flex:1;background:#dde6e6;border-radius:3px;height:13px}.bf{height:100%;border-radius:3px}.bv{font-size:11px;color:#888;width:34px}'
    +'table{width:100%;border-collapse:collapse;font-size:11px}'
    +'th{background:#eaf1f1;padding:5px 8px;text-align:left;border:1px solid #b0c8c8;font-weight:700;color:#2F4F4F}'
    +'td{padding:5px 8px;border:1px solid #e0e8e8}tr:nth-child(even) td{background:#f4f8f4}'
    +'@media print{body{padding:0;-webkit-print-color-adjust:exact;print-color-adjust:exact}}</style></head><body>'
    +'<h1>電腦預約系統 — 統計報表</h1>'
    +'<div class="sub">查詢區間：'+range+'　　匯出時間：'+new Date().toLocaleString('zh-TW')+'</div>'
    +'<div class="stats">'
    +'<div class="sc"><div class="sl">總預約筆數</div><div class="sv">'+f.length+'</div></div>'
    +'<div class="sc"><div class="sl">總使用時數</div><div class="sv" style="color:#018948">'+totalH.toFixed(1)+'h</div></div>'
    +'<div class="sc"><div class="sl">未到次數</div><div class="sv" style="color:#a42a2b">'+absent+'</div></div>'
    +'<div class="sc"><div class="sl">報到率</div><div class="sv" style="color:#018948">'+rate+'%</div></div>'
    +'</div>'
    +'<div class="g2">'
    +'<div><div class="st">熱門時段 TOP 5</div>'+top.map(function(e){ return '<div class="br"><div class="bl">'+e[0]+'</div><div class="bt"><div class="bf" style="width:'+Math.round(e[1]/Math.max(top[0][1],1)*100)+'%;background:#2F4F4F"></div></div><div class="bv">'+e[1]+'次</div></div>'; }).join('')+'</div>'
    +'<div><div class="st">各電腦使用時數</div>'+COMPUTERS.map(function(c){ return '<div class="br"><div class="bl">電腦'+c+'</div><div class="bt"><div class="bf" style="width:'+Math.round(ch[c]/maxCH*100)+'%;background:'+COMP_COLORS[c-1]+'"></div></div><div class="bv">'+ch[c].toFixed(1)+'h</div></div>'; }).join('')+'</div>'
    +'</div>'
    +'<div class="st">預約清單（'+f.length+' 筆）</div>'
    +'<table><thead><tr><th>日期</th><th>電腦</th><th>單位</th><th>姓名</th><th>電話</th><th>信箱</th><th>說明</th><th>時段</th><th>時數</th><th>狀態</th></tr></thead>'
    +'<tbody>'+rows+'</tbody></table>'
    +'<script>window.onload=function(){window.print();}<\/script>'
    +'</body></html>');
  w.document.close();
}

function startApp(){
  S.weekStart = getMonday(new Date());
  document.getElementById('loading-screen').style.display='none';
  document.getElementById('app').style.display='block';
  window._appReady=true;
  renderMain();
}

// offline fallback（Firebase CDN 載入失敗時）
setTimeout(function(){
  if(!window._appReady) startApp();
}, 5000);
</script>
