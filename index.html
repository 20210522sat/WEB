<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>研以致用</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=Noto+Sans+TC:wght@400;500;700&family=Lato:wght@400;700&family=Merriweather:wght@400;700&family=Source+Sans+3:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#1a1a2e;--ink2:#4a4a6a;--ink3:#8888aa;
  --cream:#f8f7f2;--gold:#c9a84c;--gold2:#e8c87a;--gold3:#f5e8c0;
  --teal:#2d7a6b;--teal2:#3d9b89;
  --border:#e0ddd5;--card:#ffffff;
  --danger:#c0392b;--dangerBg:#fdecea;--purple:#5a3fa0;
  --bg-page:var(--cream);--nav-bg:var(--ink);
  --font-body:'Noto Sans TC',sans-serif;--font-display:'Noto Serif TC',serif;
}
html{scroll-behavior:smooth}
body{font-family:var(--font-body);background:var(--bg-page);color:var(--ink);min-height:100vh;overflow-x:hidden}

nav{background:var(--nav-bg);padding:0 2rem;display:flex;align-items:center;justify-content:space-between;height:60px;position:sticky;top:0;z-index:100}
.nav-left{display:flex;flex-direction:column;justify-content:center;gap:1px;cursor:pointer}
.nav-logo{font-family:var(--font-display);color:var(--gold);font-size:1.05rem;font-weight:700;letter-spacing:2px;line-height:1.2}
.nav-sub{font-size:0.6rem;color:rgba(255,255,255,0.4);letter-spacing:.3px}
.nav-right{display:flex;align-items:center;gap:.7rem}
.nav-back{color:#ccc;font-size:0.78rem;cursor:pointer;border:1px solid #555;border-radius:4px;padding:4px 10px;background:none;font-family:inherit;transition:all .2s}
.nav-back:hover{color:#fff;border-color:#999}
.nav-btn{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.18);color:#ccc;padding:5px 10px;border-radius:4px;font-size:0.76rem;cursor:pointer;font-family:inherit;transition:all .2s}
.nav-btn:hover{background:rgba(255,255,255,0.16);color:#fff}
.admin-btn{background:var(--gold);color:var(--ink);border:none;padding:6px 13px;border-radius:4px;font-size:0.78rem;cursor:pointer;font-family:inherit;font-weight:500}
.admin-btn:hover{opacity:.85}
.logout-btn{background:rgba(192,57,43,0.15);border:1px solid rgba(192,57,43,0.3);color:#e88;padding:5px 10px;border-radius:4px;font-size:0.76rem;cursor:pointer;font-family:inherit;display:none}
.logout-btn:hover{background:rgba(192,57,43,0.25)}

.page{display:none;animation:fadeIn .3s ease}
.page.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

.home-hero{background:linear-gradient(150deg,var(--nav-bg) 0%,#252545 55%,#1e3a34 100%);padding:4.5rem 2rem 0;text-align:center;position:relative;overflow:hidden}
.home-hero::before{content:'';position:absolute;top:-30%;left:-20%;width:60%;height:160%;background:radial-gradient(ellipse,rgba(201,168,76,.07) 0%,transparent 65%);pointer-events:none}
.home-hero::after{content:'';position:absolute;bottom:-20%;right:-10%;width:50%;height:120%;background:radial-gradient(ellipse,rgba(45,122,107,.08) 0%,transparent 65%);pointer-events:none}
.home-hero-inner{position:relative;z-index:1;padding-bottom:2rem}
.hospital-badge{display:inline-flex;align-items:center;gap:7px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.15);border-radius:24px;padding:6px 16px;margin-bottom:1.2rem;font-size:0.74rem;color:rgba(255,255,255,.55)}
.hospital-badge b{color:rgba(255,255,255,.9);font-weight:500}
.home-eyebrow{display:inline-block;border:1px solid rgba(201,168,76,.4);color:var(--gold);font-size:0.69rem;letter-spacing:3px;padding:4px 14px;border-radius:20px;margin-bottom:1.1rem}
.home-title{font-family:var(--font-display);color:#fff;font-size:clamp(2rem,5vw,3.2rem);font-weight:700;line-height:1.25;margin-bottom:.8rem}
.home-title em{color:var(--gold);font-style:normal}
.home-desc{color:rgba(255,255,255,.55);font-size:.9rem;max-width:460px;margin:0 auto;line-height:1.8}
.home-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(245px,1fr));gap:1.2rem;max-width:880px;margin:2.2rem auto 0;padding:0 0 3rem;position:relative;z-index:1}

.entry-card{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:16px;padding:2rem 1.6rem;cursor:pointer;transition:all .25s;text-align:left;position:relative;overflow:hidden}
.entry-card::before{content:'';position:absolute;inset:0;opacity:0;transition:opacity .3s;pointer-events:none}
.entry-card:hover{transform:translateY(-5px);border-color:rgba(255,255,255,.28);background:rgba(255,255,255,.1)}
.entry-card:hover::before{opacity:1}
.entry-card.c-gold::before{background:radial-gradient(ellipse at 30% 0%,rgba(201,168,76,.15),transparent 70%)}
.entry-card.c-teal::before{background:radial-gradient(ellipse at 30% 0%,rgba(45,122,107,.18),transparent 70%)}
.entry-card.c-purple::before{background:radial-gradient(ellipse at 30% 0%,rgba(90,63,160,.18),transparent 70%)}
.entry-card.c-blue::before{background:radial-gradient(ellipse at 30% 0%,rgba(30,100,200,.18),transparent 70%)}
.entry-card.c-red::before{background:radial-gradient(ellipse at 30% 0%,rgba(180,40,40,.18),transparent 70%)}
.entry-icon{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;margin-bottom:1rem;position:relative;z-index:1}
.entry-card.c-gold .entry-icon{background:rgba(201,168,76,.15)}
.entry-card.c-teal .entry-icon{background:rgba(45,122,107,.15)}
.entry-card.c-purple .entry-icon{background:rgba(90,63,160,.15)}
.entry-card.c-blue .entry-icon{background:rgba(30,100,200,.15)}
.entry-card.c-red .entry-icon{background:rgba(180,40,40,.15)}
.entry-card h2{font-family:var(--font-display);font-size:1.1rem;color:#fff;margin-bottom:.5rem;position:relative;z-index:1}
.entry-card p{font-size:.8rem;color:rgba(255,255,255,.5);line-height:1.7;position:relative;z-index:1;margin-bottom:1.2rem}
.entry-arrow{display:flex;align-items:center;gap:6px;font-size:.8rem;font-weight:500;position:relative;z-index:1;transition:gap .2s}
.entry-card:hover .entry-arrow{gap:12px}
.entry-card.c-gold .entry-arrow{color:var(--gold2)}
.entry-card.c-teal .entry-arrow{color:#5ecfba}
.entry-card.c-purple .entry-arrow{color:#b39ddb}
.entry-card.c-blue .entry-arrow{color:#90caf9}
.entry-card.c-red .entry-arrow{color:#ef9a9a}

.home-stats{display:flex;justify-content:center;gap:3rem;padding:2rem 1.5rem;flex-wrap:wrap;max-width:680px;margin:0 auto;border-top:1px solid var(--border);border-bottom:1px solid var(--border)}
.stat-item{text-align:center}
.stat-num{font-family:var(--font-display);font-size:1.9rem;font-weight:700;color:var(--ink)}
.stat-label{font-size:.77rem;color:var(--ink3);margin-top:2px}

.sub-hero{padding:2.8rem 2rem 2.2rem;background:var(--nav-bg);text-align:center;position:relative;overflow:hidden}
.sub-hero::after{content:'';position:absolute;inset:0;pointer-events:none}
.sub-hero.sh-gold::after{background:radial-gradient(ellipse at 50% 110%,rgba(201,168,76,.12),transparent 65%)}
.sub-hero.sh-teal::after{background:radial-gradient(ellipse at 50% 110%,rgba(45,122,107,.15),transparent 65%)}
.sub-hero.sh-purple::after{background:radial-gradient(ellipse at 50% 110%,rgba(90,63,160,.15),transparent 65%)}
.sub-hero.sh-blue::after{background:radial-gradient(ellipse at 50% 110%,rgba(30,100,200,.15),transparent 65%)}
.sub-hero.sh-red::after{background:radial-gradient(ellipse at 50% 110%,rgba(180,40,40,.15),transparent 65%)}
.sub-hero-inner{position:relative;z-index:1}
.sub-badge{display:inline-flex;align-items:center;gap:6px;font-size:.72rem;padding:4px 14px;border-radius:20px;margin-bottom:1rem;letter-spacing:1px}
.sh-gold .sub-badge{background:rgba(201,168,76,.15);color:var(--gold2);border:1px solid rgba(201,168,76,.3)}
.sh-teal .sub-badge{background:rgba(45,122,107,.2);color:#7ddece;border:1px solid rgba(94,207,186,.3)}
.sh-purple .sub-badge{background:rgba(90,63,160,.2);color:#b39ddb;border:1px solid rgba(179,157,219,.3)}
.sh-blue .sub-badge{background:rgba(30,100,200,.2);color:#90caf9;border:1px solid rgba(144,202,249,.3)}
.sh-red .sub-badge{background:rgba(180,40,40,.2);color:#ef9a9a;border:1px solid rgba(239,154,154,.3)}
.sub-hero h1{font-family:var(--font-display);color:#fff;font-size:clamp(1.5rem,3.5vw,2.1rem);font-weight:700;margin-bottom:.6rem}
.sub-hero p{color:rgba(255,255,255,.55);font-size:.87rem;max-width:460px;margin:0 auto;line-height:1.8}
.sub-content{max-width:960px;margin:0 auto;padding:2rem 1.5rem 3rem}

.lecture-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(285px,1fr));gap:1.1rem}
.lecture-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.4rem;transition:all .22s}
.lecture-card:hover{box-shadow:0 6px 24px rgba(0,0,0,.09);transform:translateY(-2px)}
.lc-tag{display:inline-block;background:var(--gold3);color:#7a5c10;font-size:.7rem;padding:3px 10px;border-radius:20px;margin-bottom:10px;font-weight:500}
.lecture-card h3{font-size:.97rem;font-weight:500;color:var(--ink);line-height:1.55;margin-bottom:10px}
.lc-meta{font-size:.79rem;color:var(--ink3);margin-bottom:5px;display:flex;align-items:center;gap:6px}
.register-btn{display:inline-block;margin-top:12px;padding:7px 18px;background:var(--teal);color:#fff;border-radius:6px;font-size:.82rem;text-decoration:none;cursor:pointer;border:none;font-family:inherit;transition:background .2s}
.register-btn:hover{background:var(--teal2)}
.full-badge{background:var(--dangerBg);color:var(--danger);font-size:.72rem;padding:4px 12px;border-radius:20px;display:inline-block;margin-top:12px;font-weight:500}

.ai-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(215px,1fr));gap:1.1rem}
.ai-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.4rem;transition:all .22s}
.ai-card:hover{box-shadow:0 6px 24px rgba(0,0,0,.09);transform:translateY(-2px)}
.ai-icon{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;margin-bottom:12px;font-size:22px}
.ai-card h3{font-size:.95rem;font-weight:500;margin-bottom:6px;color:var(--ink)}
.ai-card p{font-size:.8rem;color:var(--ink3);line-height:1.65;margin-bottom:12px}
.ai-link{font-size:.8rem;color:var(--teal);text-decoration:none;font-weight:500}
.ai-link:hover{text-decoration:underline}

.consult-layout{display:grid;grid-template-columns:1fr 1fr;gap:1.4rem;align-items:start}
@media(max-width:640px){.consult-layout{grid-template-columns:1fr}}
.consult-main{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:2rem;text-align:center}
.consult-main .big-icon{font-size:2.8rem;margin-bottom:1rem}
.consult-main h2{font-family:var(--font-display);font-size:1.2rem;margin-bottom:.6rem}
.consult-main>p{font-size:.86rem;color:var(--ink2);line-height:1.8;margin-bottom:1.4rem}
.consult-cta{display:inline-block;padding:11px 30px;background:var(--ink);color:#fff;border-radius:8px;font-size:.9rem;cursor:pointer;border:none;font-family:inherit;font-weight:500;transition:opacity .2s}
.consult-cta:hover{opacity:.85}
.consult-feats{display:flex;flex-direction:column;gap:9px;margin-top:1.4rem;text-align:left}
.cf-item{display:flex;align-items:flex-start;gap:10px;font-size:.81rem;color:var(--ink2);background:#f9f9f6;border-radius:8px;padding:10px 12px}
.cf-icon{font-size:1.1rem;flex-shrink:0;line-height:1.4}
.cf-text strong{display:block;font-weight:500;color:var(--ink);margin-bottom:2px;font-size:.83rem}
.consult-side{display:flex;flex-direction:column;gap:1rem}
.consult-faq{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:1.4rem}
.consult-faq h3{font-size:.88rem;font-weight:500;margin-bottom:1rem;color:var(--ink2)}
.faq-item{border-bottom:1px solid var(--border);padding:10px 0}
.faq-item:last-child{border-bottom:none;padding-bottom:0}
.faq-q{font-size:.84rem;font-weight:500;color:var(--ink);margin-bottom:4px}
.faq-a{font-size:.79rem;color:var(--ink3);line-height:1.65}
.custom-block{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.6rem;margin-bottom:1.2rem}
.custom-block h3{font-family:var(--font-display);font-size:1.1rem;margin-bottom:.5rem}
.custom-block p{font-size:.88rem;color:var(--ink2);line-height:1.8;white-space:pre-wrap}
.empty-msg{color:var(--ink3);font-size:.88rem;padding:2.5rem 0;text-align:center}

.cf-wrap{max-width:960px;margin:0 auto;padding:0 1.5rem 3rem;display:grid;grid-template-columns:1fr 1fr;gap:1.4rem}
@media(max-width:640px){.cf-wrap{grid-template-columns:1fr}}
.contact-box,.feedback-box{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:1.6rem}
.contact-box h3,.feedback-box h3{font-family:var(--font-display);font-size:1rem;margin-bottom:1rem;color:var(--ink)}
.ci{display:flex;align-items:flex-start;gap:10px;margin-bottom:10px;font-size:.84rem;color:var(--ink2)}
.ci .cii{font-size:1rem;flex-shrink:0;margin-top:1px}
.ci a{color:var(--teal);text-decoration:none}
.ci a:hover{text-decoration:underline}
.fb-field{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:7px;font-size:.83rem;font-family:inherit;color:var(--ink);margin-bottom:8px;resize:vertical;background:#fff}
.fb-field:focus{outline:none;border-color:var(--teal)}
.fb-submit{background:var(--teal);color:#fff;border:none;padding:8px 20px;border-radius:7px;font-size:.83rem;cursor:pointer;font-family:inherit;font-weight:500;transition:background .2s}
.fb-submit:hover{background:var(--teal2)}
.fb-submit:disabled{opacity:.6;cursor:not-allowed}
.fb-ok{font-size:.82rem;color:var(--teal);margin-top:6px;display:none}

footer{background:var(--nav-bg);color:#555;text-align:center;padding:1.6rem 1rem}
.footer-hospital{font-size:.71rem;color:rgba(255,255,255,.28);margin-bottom:5px}
.footer-main{font-size:.79rem}
.footer-main span{color:var(--gold)}

/* THEME */
.theme-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:250;align-items:flex-start;justify-content:flex-end}
.theme-overlay.active{display:flex}
.theme-panel{background:#fff;width:300px;height:100%;overflow-y:auto;box-shadow:-4px 0 24px rgba(0,0,0,.15);animation:slideIn .25s ease}
@keyframes slideIn{from{transform:translateX(100%)}to{transform:translateX(0)}}
.tp-hdr{background:var(--ink);padding:1rem 1.2rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0}
.tp-hdr h3{color:var(--gold);font-family:var(--font-display);font-size:.95rem}
.tp-close{background:none;border:none;color:#aaa;font-size:1.2rem;cursor:pointer}
.tp-body{padding:1.2rem}
.tp-sec{margin-bottom:1.4rem}
.tp-sec h4{font-size:.75rem;font-weight:500;color:var(--ink2);letter-spacing:1px;text-transform:uppercase;margin-bottom:.8rem;padding-bottom:6px;border-bottom:1px solid var(--border)}
.tp-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.tp-row label{font-size:.81rem;color:var(--ink)}
.tp-row input[type=color]{width:34px;height:26px;border:1px solid var(--border);border-radius:4px;padding:2px;cursor:pointer;background:none}
.tp-row select,.tp-row input[type=range]{flex:1;margin-left:10px;font-family:inherit;font-size:.79rem;border:1px solid var(--border);border-radius:5px;padding:4px 6px;color:var(--ink)}
.tp-row input[type=range]{padding:0;height:4px;accent-color:var(--teal)}
.fp{font-size:.77rem;color:var(--ink3);margin:-4px 0 8px}
.preset-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.preset-btn{border:1px solid var(--border);border-radius:7px;padding:7px 5px;cursor:pointer;font-size:.73rem;font-family:inherit;text-align:center;background:#fff;transition:all .2s}
.preset-btn:hover{border-color:#888}
.pswatch{width:100%;height:20px;border-radius:3px;margin-bottom:4px}
.tp-acts{display:flex;gap:8px;margin-top:1rem}
.tp-save{flex:1;background:var(--teal);color:#fff;border:none;padding:8px;border-radius:6px;font-size:.82rem;cursor:pointer;font-family:inherit}
.tp-reset{background:#f5f5f0;border:1px solid var(--border);color:var(--ink2);padding:8px 12px;border-radius:6px;font-size:.82rem;cursor:pointer;font-family:inherit}

/* LOGIN */
.login-overlay{display:none;position:fixed;inset:0;background:rgba(10,10,25,.75);z-index:300;align-items:center;justify-content:center;backdrop-filter:blur(5px)}
.login-overlay.active{display:flex}
.login-box{background:#fff;border-radius:16px;padding:2.4rem 2rem 2rem;width:90%;max-width:380px;text-align:center}
.login-icon{font-size:2.4rem;margin-bottom:.8rem}
.login-box h3{font-family:var(--font-display);font-size:1.1rem;color:var(--ink);margin-bottom:.3rem}
.login-box>p{font-size:.8rem;color:var(--ink3);margin-bottom:1.4rem}
.login-field{width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:8px;font-size:.9rem;font-family:inherit;color:var(--ink);margin-bottom:10px;transition:border-color .2s}
.login-field:focus{outline:none;border-color:var(--teal)}
.login-field.error{border-color:var(--danger)}
.login-submit{width:100%;padding:11px;background:var(--ink);color:#fff;border:none;border-radius:8px;font-size:.9rem;cursor:pointer;font-family:inherit;font-weight:500;margin-bottom:.6rem;transition:opacity .2s}
.login-submit:hover{opacity:.85}
.login-submit:disabled{opacity:.5;cursor:not-allowed}
.login-cancel{background:none;border:none;color:var(--ink3);font-size:.8rem;cursor:pointer;font-family:inherit}
.login-err{font-size:.78rem;color:var(--danger);min-height:1.2em;margin-bottom:.5rem}
.login-loading{font-size:.8rem;color:var(--ink3);margin-bottom:.5rem}

/* ADMIN */
.admin-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center}
.admin-overlay.active{display:flex}
.admin-modal{background:#fff;border-radius:12px;width:94%;max-width:820px;max-height:90vh;overflow:hidden;display:flex;flex-direction:column}
.adm-hdr{background:var(--ink);padding:.9rem 1.4rem;display:flex;align-items:center;justify-content:space-between}
.adm-hdr h2{color:var(--gold);font-family:var(--font-display);font-size:1rem;font-weight:600}
.adm-hdr-right{display:flex;align-items:center;gap:8px}
.adm-close{background:none;border:none;color:#aaa;font-size:1.2rem;cursor:pointer}
.adm-body{display:flex;flex:1;overflow:hidden}
.adm-sidebar{width:145px;background:#f9f9f6;border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;flex-shrink:0}
.adm-tab{padding:10px 12px;border:none;background:none;font-size:.78rem;cursor:pointer;font-family:inherit;color:var(--ink3);text-align:left;border-left:3px solid transparent;transition:all .2s;line-height:1.4}
.adm-tab:hover{background:#f0efe8;color:var(--ink)}
.adm-tab.active{color:var(--teal);border-left-color:var(--teal);background:#fff;font-weight:500}
.adm-content{flex:1;overflow-y:auto;padding:1.2rem}
.adm-sec{display:none}
.adm-sec.active{display:block}
.adm-title{font-size:.81rem;font-weight:500;color:var(--ink2);margin-bottom:1rem;padding-bottom:6px;border-bottom:1px solid var(--border)}
.fi{width:100%;padding:7px 10px;border:1px solid var(--border);border-radius:6px;font-size:.82rem;font-family:inherit;background:#fff;color:var(--ink);margin-bottom:6px}
.fi:focus{outline:none;border-color:var(--teal)}
.fi-lbl{display:block;font-size:.77rem;font-weight:500;color:var(--ink2);margin-bottom:4px}
.fi-g{margin-bottom:10px}
.fi-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.fi-row.full{grid-template-columns:1fr}
.btn-t{background:var(--teal);color:#fff;border:none;padding:7px 16px;border-radius:6px;font-size:.81rem;cursor:pointer;font-family:inherit;margin-top:4px;transition:background .2s}
.btn-t:hover{background:var(--teal2)}
.btn-t:disabled{opacity:.5;cursor:not-allowed}
.btn-k{background:var(--ink);color:#fff;border:none;padding:7px 16px;border-radius:6px;font-size:.81rem;cursor:pointer;font-family:inherit}

// DB LOAD / SAVE
// ═══════════════════════════════════════════
async function loadFromDB() {
  try {
    const [siteRes, pagesRes, contactRes] = await Promise.all([
      sb.from('site_config').select('*'),
      sb.from('pages').select('*').order('sort_order'),
      sb.from('contact').select('*').order('id').limit(1),
    ]);
    const siteRows = siteRes.data || [];
    const findVal = (key, def) => { const r = siteRows.find(x => x.id === key); return r ? r.value : def; };
    S = {
      site: findVal('site', defaultSite),
      contact: findVal('contact', defaultContact),
      feedback: findVal('feedback', defaultFeedback),
      pages: (pagesRes.data && pagesRes.data.length > 0)
        ? pagesRes.data.map(r => ({ ...r.data, id: r.id, sort_order: r.sort_order }))
        : defaultPages,
      nextId: findVal('nextId', 100),
    };
  } catch(e) {
    console.error('DB load error:', e);
    S = { site: defaultSite, contact: defaultContact, feedback: defaultFeedback, pages: defaultPages, nextId: 100 };
  }
}

async function saveToDB(key, value) {
  await sb.from('site_config').upsert({ id: key, value, updated_at: new Date().toISOString() });
}

async function savePageToDB(page) {
  const { id, sort_order, ...data } = page;
  await sb.from('pages').upsert({ id, data: { ...data, id }, sort_order: sort_order || 0, updated_at: new Date().toISOString() });
}

async function deletePageFromDB(pageId) {
  await sb.from('pages').delete().eq('id', pageId);
}

async function saveFeedbackToDB(name, email, message, page) {
  return await sb.from('feedback').insert({ name, email, message, page, created_at: new Date().toISOString() });
}

async function loadFeedbackFromDB() {
  const { data } = await sb.from('feedback').select('*').order('created_at', { ascending: false }).limit(50);
  return data || [];
}

function openLogin() {
  document.getElementById('login-email').value = '';

  document.getElementById('login-err').textContent = '';
  document.getElementById('loginOverlay').classList.add('active');
  setTimeout(() => document.getElementById('login-email').focus(), 100);
}
function closeLogin() { document.getElementById('loginOverlay').classList.remove('active'); }

async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pw = document.getElementById('login-pw').value;
  const btn = document.getElementById('login-submit-btn');
  const err = document.getElementById('login-err');
  if (!email || !pw) { err.textContent = '請填寫 Email 和密碼'; return; }
  btn.disabled = true; btn.textContent = '登入中...';
  err.textContent = '';
  const { data, error } = await sb.auth.signInWithPassword({ email, password: pw });
  btn.disabled = false; btn.textContent = '登入';
  if (error) { err.textContent = '登入失敗：' + (error.message === 'Invalid login credentials' ? '帳號或密碼錯誤' : error.message); return; }
  currentUser = data.user;
  updateAuthUI();
  closeLogin();
  openAdmin();
}

async function doLogout() {
  await sb.auth.signOut();
  currentUser = null;
  updateAuthUI();
  closeAdmin();

function renderFooter() {
  document.getElementById('f-hospital').textContent = S.site.hospital;
  document.getElementById('f-title').textContent = S.site.footerTitle || S.site.logo;
}

async function submitFeedback(btn, uid, formUrl) {
  if (formUrl) { window.open(formUrl, '_blank'); return; }
  const msg = document.getElementById('fb-msg-' + uid)?.value?.trim();
  const name = document.getElementById('fb-name-' + uid)?.value?.trim();
  const email = document.getElementById('fb-email-' + uid)?.value?.trim();
  if (!msg) { alert('請填寫意見內容'); return; }
  btn.disabled = true; btn.textContent = '送出中...';
  await saveFeedbackToDB(name || null, email || null, msg, window._currentPage || 'home');
  btn.style.display = 'none';
  const ok = btn.nextElementSibling; if (ok) ok.style.display = 'block';
}

function openConsultForm(pageId) {
  const p = S.pages.find(x => x.id === pageId);
  const url = p && p.consultMain ? p.consultMain.url : '';
  if (url) window.open(url, '_blank');
  else alert('管理者尚未設定諮詢表單連結。');
}

function switchAdmTab(id, btn) {
  document.querySelectorAll('.adm-sec').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.adm-tab').forEach(b => b.classList.remove('active'));
  const target = document.getElementById('adm-' + id) || document.getElementById('adm-pe-' + id.replace('pe-', ''));
  if (target) target.classList.add('active');
  if (btn) btn.classList.add('active');
  else { const el = document.querySelector(`[onclick="switchAdmTab('${id}',this)"]`); if (el) el.classList.add('active'); }
}

async function loadInbox() {
  const el = document.getElementById('inbox-list');
  el.innerHTML = '<div style="color:var(--ink3);font-size:.84rem">載入中...</div>';
  const items = await loadFeedbackFromDB();
  if (!items.length) { el.innerHTML = '<div style="color:var(--ink3);font-size:.84rem">尚無回饋</div>'; return; }
  el.innerHTML = items.map(it => `
    <div class="fb-inbox-item">
      <div class="fb-inbox-meta">${it.created_at ? new Date(it.created_at).toLocaleString('zh-TW') : ''}
        ${it.name ? ` ・ ${it.name}` : ''}
        ${it.email ? ` ・ <a href="mailto:${it.email}" style="color:var(--teal)">${it.email}</a>` : ''}
      </div>
      <div class="fb-inbox-msg">${it.message}</div>
    </div>`).join('');
}

// ── SAVE FUNCTIONS ──
function showStatus(id, msg, isErr) {
  const el = document.getElementById('status-' + id);
  if (!el) return;
  el.textContent = msg;
  el.className = 'status-msg' + (isErr ? ' status-err' : '');
  setTimeout(() => { if (el) el.textContent = ''; }, 3000);
}

async function saveSite() {
  const btn = document.getElementById('btn-save-site');
  btn.disabled = true; btn.innerHTML = '<span class="saving-spinner"></span>儲存中...';
  S.site = { logo: v('as-logo'), subLogo: v('as-sublogo'), hospital: v('as-hospital'), eyebrow: v('as-eyebrow'), heroTitle: v('as-htitle'), heroDesc: v('as-hdesc'), footerTitle: v('as-ftitle') };
  try { await saveToDB('site', S.site); renderAll(); showStatus('site', '✓ 已儲存'); }
  catch(e) { showStatus('site', '儲存失敗：' + e.message, true); }
  btn.disabled = false; btn.textContent = '儲存網站設定';
}

async function savePageMeta(pid) {
  const p = S.pages.find(x => x.id === pid); if (!p) return;
  p.icon = v('pe-icon-' + pid); p.title = v('pe-title-' + pid); p.desc = v('pe-desc-' + pid);
  p.color = v('pe-color-' + pid); p.heroColor = v('pe-hcolor-' + pid);
  p.heroBadge = v('pe-badge-' + pid); p.heroTitle = v('pe-htitle-' + pid); p.heroDesc = v('pe-hdesc-' + pid);
  try { await savePageToDB(p); renderAll(); buildAdminSidebar(); showStatus('pe-' + pid, '✓ 已儲存'); }
  catch(e) { showStatus('pe-' + pid, '儲存失敗', true); }
}

async function saveCustom(pid) {
  const p = S.pages.find(x => x.id === pid); if (!p) return;
  p.customTitle = v('cc-title-' + pid); p.customContent = v('cc-content-' + pid);
  try { await savePageToDB(p); renderAll(); showStatus('custom-' + pid, '✓ 已儲存'); }
  catch(e) { showStatus('custom-' + pid, '儲存失敗', true); }
}

async function saveConsultPage(pid) {
  const p = S.pages.find(x => x.id === pid); if (!p) return;
  if (!p.consultMain) p.consultMain = { features: [] };
  p.consultMain.icon = v('cm-icon-' + pid); p.consultMain.title = v('cm-title-' + pid);
  p.consultMain.desc = v('cm-desc-' + pid); p.consultMain.btnText = v('cm-btn-' + pid); p.consultMain.url = v('cm-url-' + pid);

}

async function addPage() {
  const icon = v('np-icon') || '📄', title = v('np-title');
  if (!title) { alert('請填寫頁面標題'); return; }
  const id = 'page' + S.nextId++;
  const type = v('np-type'), color = v('np-color');
  const hcm = { 'c-gold': 'sh-gold', 'c-teal': 'sh-teal', 'c-purple': 'sh-purple', 'c-blue': 'sh-blue', 'c-red': 'sh-red' };
  const np = { id, icon, title, desc: v('np-desc'), color, heroColor: hcm[color] || 'sh-gold', heroBadge: icon + ' ' + title.toUpperCase(), heroTitle: title, heroDesc: v('np-desc'), type, sort_order: S.pages.length, items: [] };
  if (type === 'consult') { np.consultMain = { icon: '🎓', title, desc: '', btnText: '填寫諮詢表單', url: '', features: [] }; np.faq = { title: '常見問題', items: [] }; }
  S.pages.push(np);
  await saveToDB('nextId', S.nextId);
  await savePageToDB(np);
  ['np-icon', 'np-title', 'np-desc'].forEach(id => { const el = document.getElementById(id); if (el) el.value = ''; });
  renderAll(); buildAdminSidebar(); buildAdminContent(); switchAdmTab('pe-' + id, null);
}

async function deletePage(pid) {
  if (!confirm('確定要刪除此頁面嗎？')) return;
  S.pages = S.pages.filter(p => p.id !== pid);
  await deletePageFromDB(pid);
  renderAll(); buildAdminSidebar(); buildAdminContent(); switchAdmTab('pages', null);
}

async function addLecture(pid) {
  const p = S.pages.find(x => x.id === pid); if (!p) return;
  const title = v('li-title-' + pid), date = v('li-date-' + pid);
  if (!title || !date) { alert('請填寫標題和日期'); return; }
  if (!p.items) p.items = [];
  p.items.push({ id: S.nextId++, title, date, speaker: v('li-speaker-' + pid), location: v('li-loc-' + pid), url: v('li-url-' + pid), tag: v('li-tag-' + pid) || '講座', status: v('li-status-' + pid) });
  await saveToDB('nextId', S.nextId); await savePageToDB(p);
  ['li-title-', 'li-date-', 'li-speaker-', 'li-loc-', 'li-url-', 'li-tag-'].forEach(k => { const el = document.getElementById(k + pid); if (el) el.value = ''; });
  renderAll(); buildAdminContent(); switchAdmTab('pe-' + pid, null);
}

async function addAI(pid) {
  const p = S.pages.find(x => x.id === pid); if (!p) return;
  const name = v('ai-name-' + pid), desc = v('ai-desc-' + pid);
  if (!name || !desc) { alert('請填寫名稱和簡介'); return; }
  if (!p.items) p.items = [];
  p.items.push({ id: S.nextId++, name, emoji: v('ai-emoji-' + pid) || '🔧', desc, url: v('ai-url-' + pid), color: v('ai-color-' + pid) || '#f0f0f0' });
  await saveToDB('nextId', S.nextId); await savePageToDB(p);
  ['ai-name-', 'ai-emoji-', 'ai-desc-', 'ai-url-', 'ai-color-'].forEach(k => { const el = document.getElementById(k + pid); if (el) el.value = ''; });
  renderAll(); buildAdminContent(); switchAdmTab('pe-' + pid, null);
}

async function delItem(pid, itemId) {
  if (!confirm('確定移除？')) return;
  const p = S.pages.find(x => x.id === pid); if (!p || !p.items) return;
  p.items = p.items.filter(i => i.id !== itemId);
  await savePageToDB(p); renderAll(); buildAdminContent(); switchAdmTab('pe-' + pid, null);
}

async function addFaq(pid) {
  const p = S.pages.find(x => x.id === pid); if (!p) return;
  const q = v('faq-q-' + pid), a = v('faq-a-' + pid);
  if (!q) { alert('請填寫問題'); return; }
  if (!p.faq) p.faq = { title: '常見問題', items: [] };
  p.faq.items.push({ q, a });
  await savePageToDB(p);
  ['faq-q-', 'faq-a-'].forEach(k => { const el = document.getElementById(k + pid); if (el) el.value = ''; });
  renderAll(); buildAdminContent(); switchAdmTab('pe-' + pid, null);
}

async function delFaq(pid, idx) {
  const p = S.pages.find(x => x.id === pid); if (!p || !p.faq) return;
  p.faq.items.splice(idx, 1);
  await savePageToDB(p); renderAll(); buildAdminContent(); switchAdmTab('pe-' + pid, null);
}

// ── CONTACT ITEMS ──
async function addCI() {
  const icon = v('ci-icon'), label = v('ci-label'), value = v('ci-value'), link = v('ci-link');
  if (!label || !value) { alert('請填寫標籤和內容'); return; }
  S.contact.items.push({ icon: icon || '📌', label, value, link });
  await saveToDB('contact', S.contact);
  ['ci-icon', 'ci-label', 'ci-value', 'ci-link'].forEach(id => { const el = document.getElementById(id); if (el) el.value = ''; });
  renderAll(); buildAdminContent(); switchAdmTab('contact', null);
}
function editCI(i) {
  const it = S.contact.items[i];
  const icon = prompt('圖示', it.icon); if (icon === null) return;
  const label = prompt('標籤', it.label); if (label === null) return;
  const value = prompt('內容', it.value); if (value === null) return;
  const link = prompt('連結（可空白）', it.link || '');
  S.contact.items[i] = { icon, label, value, link };
  saveToDB('contact', S.contact).then(() => { renderAll(); buildAdminContent(); switchAdmTab('contact', null); });
}
async function delCI(i) {
  if (!confirm('確定刪除？')) return;
  S.contact.items.splice(i, 1);
  await saveToDB('contact', S.contact); renderAll(); buildAdminContent(); switchAdmTab('contact', null);
}

// ═══════════════════════════════════════════
// THEME
// ═══════════════════════════════════════════
const defaultTheme = { nav: '#1a1a2e', gold: '#c9a84c', teal: '#2d7a6b', bg: '#f8f7f2', card: '#ffffff', fontBody: "'Noto Sans TC',sans-serif", fontDisplay: "'Noto Serif TC',serif", fontSize: 16 };
const presets = { classic: { nav: '#1a1a2e', gold: '#c9a84c', teal: '#2d7a6b', bg: '#f8f7f2', card: '#ffffff' }, ocean: { nav: '#0d2b45', gold: '#4dc8b8', teal: '#1a9b8a', bg: '#f0f7fa', card: '#ffffff' }, forest: { nav: '#1a2e1a', gold: '#8bc34a', teal: '#5a9b3a', bg: '#f2f7f0', card: '#ffffff' }, wine: { nav: '#2e1a1a', gold: '#e8a0b0', teal: '#9b3a5a', bg: '#faf5f5', card: '#ffffff' }, sky: { nav: '#1a2545', gold: '#90caf9', teal: '#3a7ab8', bg: '#f0f4fa', card: '#ffffff' }, warm: { nav: '#2e2010', gold: '#ffcc80', teal: '#c07830', bg: '#fdf6ed', card: '#ffffff' } };
function applyColor(k, val) { document.documentElement.style.setProperty('--' + k, val); if (k === 'teal') document.documentElement.style.setProperty('--teal2', lighten(val, 15)); }
function applyFont(type, val) { document.documentElement.style.setProperty('--font-' + type, val); const el = document.getElementById('fp-' + type); if (el) el.style.fontFamily = val; }
function applyFontSize(val) { document.documentElement.style.fontSize = val + 'px'; const el = document.getElementById('ts-val'); if (el) el.textContent = val + 'px'; }
function lighten(hex, amt) { let r = parseInt(hex.slice(1, 3), 16), g = parseInt(hex.slice(3, 5), 16), b = parseInt(hex.slice(5, 7), 16); return '#' + [Math.min(255, r + amt), Math.min(255, g + amt), Math.min(255, b + amt)].map(x => x.toString(16).padStart(2, '0')).join(''); }
function applyPreset(name) { const p = presets[name]; applyColor('nav-bg', p.nav); applyColor('gold', p.gold); applyColor('teal', p.teal); applyColor('bg-page', p.bg); applyColor('card', p.card); syncCI(p); }
function syncCI(t) { ['nav', 'gold', 'teal', 'bg', 'card'].forEach(k => { const el = document.getElementById('tc-' + k); if (el) el.value = t[k] || ''; }); }
function saveTheme() { const t = { nav: v('tc-nav'), gold: v('tc-gold'), teal: v('tc-teal'), bg: v('tc-bg'), card: v('tc-card'), fontBody: v('tf-body'), fontDisplay: v('tf-display'), fontSize: parseInt(document.getElementById('ts-size').value) }; localStorage.setItem(TK, JSON.stringify(t)); alert('外觀已儲存！'); }
function resetTheme() { if (!confirm('重置為預設外觀？')) return; localStorage.removeItem(TK); loadApplyTheme(); syncCI(defaultTheme); }
function loadApplyTheme() { let t = defaultTheme; try { const s = localStorage.getItem(TK); if (s) t = { ...defaultTheme, ...JSON.parse(s) }; } catch(e) {} applyColor('nav-bg', t.nav); applyColor('gold', t.gold); applyColor('teal', t.teal); applyColor('bg-page', t.bg); applyColor('card', t.card); applyFont('body', t.fontBody); applyFont('display', t.fontDisplay); applyFontSize(t.fontSize); return t; }
function openTheme() { const t = loadApplyTheme(); syncCI(t); document.getElementById('themeOverlay').classList.add('active'); }
function closeTheme() { document.getElementById('themeOverlay').classList.remove('active'); }

// ── HELPERS ──
function v(id) { const el = document.getElementById(id); return el ? el.value : ''; }
function esc(s) { return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════
document.getElementById('themeOverlay').addEventListener('click', function(e) { if (e.target === this) closeTheme(); });
document.getElementById('loginOverlay').addEventListener('click', function(e) { if (e.target === this) closeLogin(); });
document.getElementById('adminOverlay').addEventListener('click', function(e) { if (e.target === this) closeAdmin(); });

async function init() {
  loadApplyTheme();
  // check existing session
  const { data: { session } } = await sb.auth.getSession();
  if (session) { currentUser = session.user; updateAuthUI(); }
  // listen for auth changes
  sb.auth.onAuthStateChange((_event, session) => {
    currentUser = session ? session.user : null;
    updateAuthUI();
  });
  // load data
  await loadFromDB();
  renderAll();
  // hide loading screen
  const ls = document.getElementById('loadingScreen');
  ls.classList.add('hide');
  setTimeout(() => ls.style.display = 'none', 500);
}

init();
</script>
