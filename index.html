<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>電腦預約系統</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getDatabase, ref, set, push, update, remove, onValue, get
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

// ── 提前初始化 window._S，確保 onValue 回呼觸發時已存在 ──
window._S = {
  tab:'reserve', isAdmin:false,
  weekStart:null,  // 由同步 JS 設定
  modal:null, pickedComp:null,
  form:{ dept:'', name:'', phone:'', ext:'', note:'', _dur:1 },
  bookings:[], closedDates:new Set(), blacklist:new Map(), absCount:{},
  adminTab:'bookings', adminFilter:{ date:'', computer:'', status:'' },
  rFrom:'', rTo:'', qPhone:'', qResult:null
};
window._appReady = false;

const firebaseConfig = {
  apiKey: "AIzaSyA5aw1b8kV_aADZkGr6U_aobftl-uolxbw",
  authDomain: "pcbooking-d2b7b.firebaseapp.com",
  databaseURL: "https://pcbooking-d2b7b-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "pcbooking-d2b7b",
  storageBucket: "pcbooking-d2b7b.firebasestorage.app",
  messagingSenderId: "19266335042",
  appId: "1:19266335042:web:8b55414c1ab4b61e8ad8db"
};

const app  = initializeApp(firebaseConfig);
const db   = getDatabase(app);

// ── Firebase helpers (掛到 window 供同步 JS 使用) ──────────────────────────
window._fbReady = false;

// 新增預約 → push 回傳 key
window._fbAddBooking = async (data) => {
  const r = push(ref(db, 'bookings'));
  await set(r, data);
  return r.key;
};
// 更新預約欄位
window._fbUpdateBooking = async (id, patch) => {
  await update(ref(db, `bookings/${id}`), patch);
};
// 休館日
window._fbAddClosed = async (date) => {
  await set(ref(db, `closedDates/${date}`), true);
};
window._fbDelClosed = async (date) => {
  await remove(ref(db, `closedDates/${date}`));
};
// 黑名單
window._fbAddBlacklist = async (phone, info) => {
  const key = phone.replace(/[.#$[\]/]/g, '_');
  await set(ref(db, `blacklist/${key}`), { phone, ...info });
};
window._fbDelBlacklist = async (phone) => {
  const key = phone.replace(/[.#$[\]/]/g, '_');
  await remove(ref(db, `blacklist/${key}`));
};
// 未到計數
window._fbUpdateAbs = async (phone, count) => {
  const key = phone.replace(/[.#$[\]/]/g, '_');
  await set(ref(db, `absCount/${key}`), { phone, count });
};

// ── 即時監聽 → 有任何人新增/修改預約，所有人畫面同步更新 ─────────────────
onValue(ref(db, 'bookings'), snap => {
  const data = snap.val() || {};
  window._S.bookings = Object.entries(data).map(([id, v]) => ({ id, ...v }));
  if (window._appReady) renderMain();
});
onValue(ref(db, 'closedDates'), snap => {
  const data = snap.val() || {};
  window._S.closedDates = new Set(Object.keys(data));
  if (window._appReady) renderMain();
});
onValue(ref(db, 'blacklist'), snap => {
  const data = snap.val() || {};
  window._S.blacklist = new Map(
    Object.values(data).map(v => [v.phone, v])
  );
  if (window._appReady) renderMain();
});
onValue(ref(db, 'absCount'), snap => {
  const data = snap.val() || {};
  window._S.absCount = {};
  Object.values(data).forEach(v => { window._S.absCount[v.phone] = v.count; });
});

// 等三個主要節點都收到初始值後才啟動 App
let _loaded = 0;
function _checkReady() { if (++_loaded >= 3) startApp(); }
onValue(ref(db, 'bookings'),    () => _checkReady(), { onlyOnce: true });
onValue(ref(db, 'closedDates'), () => _checkReady(), { onlyOnce: true });
onValue(ref(db, 'blacklist'),   () => _checkReady(), { onlyOnce: true });

</script>

<style>
:root{
  --teal:#2F4F4F;--teal-lt:#eaf1f1;--teal-md:#b0c8c8;
  --amber:#BC7527;--amber-lt:#fef5e6;--amber-md:#f0d49a;
  --gold:#DAA520;--gold-lt:#fefae8;
  --green:#018948;--green-lt:#e8f5ee;--green-md:#9fd8bc;
  --red:#a42a2b;--red-lt:#fdf0f0;--red-md:#f5c6c6;
  --bg:#f7f8f6;--white:#ffffff;
  --border:rgba(47,79,79,0.13);--border-md:rgba(47,79,79,0.22);
  --text:#1a2424;--text-sub:#3d5555;--text-muted:#7a9090;
  --radius:10px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans TC','system-ui',sans-serif;background:var(--bg);color:var(--text);font-size:16px;line-height:1.6;min-height:100vh}

/* TOP BAR */
.topbar{background:var(--teal);padding:0 28px;display:flex;align-items:center;justify-content:space-between;height:64px;position:sticky;top:0;z-index:200;gap:16px;box-shadow:0 2px 10px rgba(47,79,79,0.22)}
.logo{font-size:19px;font-weight:700;display:flex;align-items:center;gap:10px;color:#fff;white-space:nowrap}
.logo-icon{width:34px;height:34px;background:var(--gold);border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--teal);font-size:16px;font-weight:700;flex-shrink:0}
.nav-tabs{display:flex;gap:4px}
.nav-tab{padding:8px 22px;border-radius:8px;border:none;background:transparent;cursor:pointer;font-size:15px;font-family:inherit;color:rgba(255,255,255,0.78);font-weight:500;transition:all .13s}
.nav-tab:hover{background:rgba(255,255,255,0.13);color:#fff}
.nav-tab.active{background:var(--gold);color:var(--teal);font-weight:700}

/* LAYOUT */
.main{padding:24px 28px;max-width:1340px;margin:0 auto;width:100%}
.card{background:var(--white);border:1px solid var(--border);border-radius:14px;padding:24px 26px}

/* GRID */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}

/* FORM */
label{font-size:14px;color:var(--text-sub);display:block;margin-bottom:5px;font-weight:600}
input,select,textarea{width:100%;padding:10px 14px;border:1px solid var(--border-md);border-radius:var(--radius);font-size:16px;font-family:inherit;background:#fff;color:var(--text);outline:none;transition:border .12s}
input:focus,select:focus,textarea:focus{border-color:var(--teal);box-shadow:0 0 0 3px rgba(47,79,79,0.10)}
.field{margin-bottom:14px}

/* BUTTONS */
.btn{padding:9px 20px;border-radius:8px;border:1px solid var(--border-md);background:transparent;cursor:pointer;font-size:15px;font-family:inherit;font-weight:500;color:var(--text);display:inline-flex;align-items:center;gap:6px;transition:all .12s;white-space:nowrap}
.btn:hover{background:var(--bg)}
.btn-primary{background:var(--teal);color:#fff;border-color:var(--teal)}.btn-primary:hover{background:#1d3535}
.btn-gold{background:var(--gold);color:var(--teal);border-color:var(--gold);font-weight:700}.btn-gold:hover{background:#b8920f}
.btn-amber{background:var(--amber);color:#fff;border-color:var(--amber)}.btn-amber:hover{background:#9a5e1e}
.btn-green{background:var(--green);color:#fff;border-color:var(--green)}.btn-green:hover{background:#016a38}
.btn-red{background:var(--red);color:#fff;border-color:var(--red)}.btn-red:hover{background:#8a2122}
.btn-danger{background:#c0392b;color:#fff;border-color:#c0392b}.btn-danger:hover{background:#962d22}
.btn-sm{padding:6px 14px;font-size:14px}
.btn-xs{padding:3px 10px;font-size:13px}

/* BADGES */
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:13px;font-weight:600}
.badge-teal{background:var(--teal-lt);color:var(--teal)}
.badge-green{background:var(--green-lt);color:#016a38}
.badge-amber{background:var(--amber-lt);color:#7a4d14}
.badge-red{background:var(--red-lt);color:var(--red)}
.badge-gray{background:#f0f0ee;color:#555}
.badge-gold{background:var(--gold-lt);color:#7a5a00}

/* WEEK GRID */
.week-header{display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.week-label{font-size:16px;font-weight:700;min-width:220px;text-align:center;color:var(--teal)}
.week-grid-wrap{overflow-x:auto}
.week-grid{border-collapse:collapse;width:100%;min-width:820px}
.week-grid th{padding:13px 8px;font-size:15px;font-weight:700;color:var(--text-sub);border:1px solid var(--border);background:#f4f7f4;text-align:center}
.week-grid th.today-h{background:var(--teal-lt);color:var(--teal)}
.week-grid td{border:1px solid var(--border);vertical-align:middle;padding:0}

/* TIME CELL — 置中 */
.time-cell{font-size:14px;color:var(--text-muted);padding:0;text-align:center;background:#f4f7f4;border-right:1px solid var(--border);width:66px;white-space:nowrap;font-weight:600;height:88px;vertical-align:middle}
/* SLOT CELL — 2× 高 */
.slot-cell{padding:4px;min-height:88px;height:88px;cursor:pointer;transition:background .1s;vertical-align:top}
.slot-cell:hover{background:#f0f5f0}
.slot-cell.closed-cell{background:#fafaf8;cursor:default}
.slot-cell.past-cell{background:#fafaf8;cursor:default;opacity:.5}

/* BOOKING CHIPS */
.booking-chip{border-radius:7px;padding:5px 7px;font-size:13px;line-height:1.4;margin:2px;overflow:hidden}
.chip-c1{background:var(--teal-lt);border-left:4px solid var(--teal);color:#1d3535}
.chip-c2{background:var(--green-lt);border-left:4px solid var(--green);color:#015a30}
.chip-c3{background:var(--amber-lt);border-left:4px solid var(--amber);color:#7a4d14}
.chip-c4{background:var(--gold-lt);border-left:4px solid var(--gold);color:#7a5a00}
.chip-name{font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chip-sub{opacity:.8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:12px}
.slot-add{font-size:13px;color:var(--text-muted);text-align:center;height:100%;display:flex;align-items:center;justify-content:center;opacity:.45}

/* COMP LEGEND */
.comp-legend{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:14px}
.comp-dot{width:13px;height:13px;border-radius:4px;flex-shrink:0}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.42);z-index:400;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:#fff;border-radius:16px;padding:30px;width:480px;max-width:96vw;max-height:92vh;overflow-y:auto}
.modal-title{font-size:18px;font-weight:700;margin-bottom:20px;color:var(--teal)}

/* ADMIN TABLE */
.table-wrap{overflow-x:auto}
table.dtable{width:100%;border-collapse:collapse;font-size:15px}
table.dtable th{text-align:left;padding:11px 14px;border-bottom:2px solid var(--teal-md);font-size:14px;color:var(--text-sub);font-weight:700;background:#f4f7f4;white-space:nowrap}
table.dtable td{padding:11px 14px;border-bottom:1px solid var(--border);vertical-align:middle}
table.dtable tr:last-child td{border-bottom:none}
table.dtable tr:hover td{background:#f7faf7}

/* STATS */
.stat-card{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:20px 22px}
.stat-label{font-size:14px;color:var(--text-sub);margin-bottom:6px;font-weight:600}
.stat-value{font-size:28px;font-weight:700}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:9px}
.bar-label{width:66px;text-align:right;font-size:14px;color:var(--text-sub);flex-shrink:0;font-weight:600}
.bar-track{flex:1;background:#e8eeee;border-radius:4px;height:18px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;transition:width .5s}
.bar-val{width:44px;font-size:13px;color:var(--text-muted)}

/* UTIL */
.flex{display:flex}.items-center{align-items:center}.justify-between{justify-content:space-between}
.gap-6{gap:6px}.gap-8{gap:8px}.gap-12{gap:12px}
.mt-8{margin-top:8px}.mt-12{margin-top:12px}.mt-16{margin-top:16px}
.mb-8{margin-bottom:8px}.mb-12{margin-bottom:12px}.mb-16{margin-bottom:16px}
.text-muted{color:var(--text-muted)}.w-full{width:100%}
.section-title{font-size:17px;font-weight:700;margin-bottom:16px;color:var(--teal)}
.divider{border:none;border-top:1px solid var(--border);margin:16px 0}
.blacklist-item{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border)}
.blacklist-item:last-child{border-bottom:none}
.row-actions{display:flex;gap:5px;flex-wrap:wrap}

/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;background:var(--teal);color:#fff;padding:12px 22px;border-radius:10px;font-size:15px;font-family:inherit;z-index:9999;display:none;max-width:380px;font-weight:500;box-shadow:0 4px 16px rgba(47,79,79,0.25)}
.toast.show{display:block}

/* LOADING */
#loading-screen{position:fixed;inset:0;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;gap:18px}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:42px;height:42px;border:4px solid var(--teal-md);border-top-color:var(--teal);border-radius:50%;animation:spin .8s linear infinite}
</style>
</head>
<body>

<div id="loading-screen">
  <div class="spinner"></div>
  <div style="font-family:'Noto Sans TC',sans-serif;color:var(--teal);font-weight:700;font-size:17px">連接資料庫中…</div>
</div>

<div id="app" style="display:none">
  <div class="topbar">
    <div class="logo">
      <div class="logo-icon">電</div>
      電腦預約系統
    </div>
    <div class="nav-tabs">
      <button class="nav-tab active" id="tab-reserve" onclick="showTab('reserve')">預約</button>
      <button class="nav-tab" id="tab-admin"   onclick="showTab('admin')">管理後台</button>
      <button class="nav-tab" id="tab-report"  onclick="showTab('report')">統計報表</button>
    </div>
  </div>
  <div class="main" id="main"></div>
</div>

<div class="toast"   id="toast"></div>
<div id="modal-area"></div>

<script>
// ── CONFIG ────────────────────────────────────────────────────────────────────
const COMPUTERS    = [1,2,3,4];
const OPEN = 9, CLOSE = 17, MAX_SLOTS = 8;
const ADMIN_PASS   = 'admin1234';           // ★ 改成你的密碼
const COMP_COLORS  = ['#2F4F4F','#018948','#BC7527','#DAA520'];
const CHIP_CLS     = ['chip-c1','chip-c2','chip-c3','chip-c4'];

// 台灣國定假日 2025–2027（含彈性放假）
const TW_HOLIDAYS  = new Set([
  '2025-01-01','2025-01-27','2025-01-28','2025-01-29','2025-01-30','2025-01-31',
  '2025-02-28','2025-04-04','2025-04-05','2025-04-06',
  '2025-05-01','2025-05-30','2025-05-31','2025-06-07','2025-06-08',
  '2025-09-29','2025-10-10',
  '2026-01-01','2026-01-26','2026-02-16','2026-02-17','2026-02-18',
  '2026-02-19','2026-02-20','2026-02-28',
  '2026-04-04','2026-04-05','2026-04-06','2026-04-30','2026-05-01',
  '2026-06-19','2026-06-20','2026-09-24','2026-09-25','2026-10-09','2026-10-10',
  '2027-01-01','2027-02-05','2027-02-06','2027-02-07',
  '2027-02-08','2027-02-09','2027-02-28',
  '2027-04-03','2027-04-04','2027-04-05',
  '2027-05-01','2027-06-09','2027-10-01','2027-10-10'
]);

function genSlots(){
  const s=[];
  for(let h=OPEN;h<CLOSE;h++){
    s.push(`${String(h).padStart(2,'0')}:00`);
    s.push(`${String(h).padStart(2,'0')}:30`);
  }
  return s;
}
const SLOTS = genSlots();

// ── STATE ─────────────────────────────────────────────────────────────────────
// window._S 已在 Firebase module 提前初始化
// 這裡補上需要呼叫同步函式的欄位
window._S.weekStart = getMonday(new Date());
// form 需要加上 note 欄位（firebase module 版本較舊時的 fallback）
if(!window._S.form.hasOwnProperty('note')) window._S.form.note = '';
const S = window._S;

// ── DATE UTILS ────────────────────────────────────────────────────────────────
function today(){ return new Date().toISOString().slice(0,10); }
function toStr(d){ return d.toISOString().slice(0,10); }
function getMonday(d){
  const dd=new Date(d); const day=dd.getDay();
  dd.setDate(dd.getDate()-day+(day===0?-6:1)); return dd;
}
function addDays(d,n){ const dd=new Date(d); dd.setDate(dd.getDate()+n); return dd; }
function fDate(s){ if(!s)return''; const[y,m,d]=s.split('-'); return`${y}/${m}/${d}`; }
function fShort(s){ if(!s)return''; const[,m,d]=s.split('-'); return`${m}/${d}`; }
function wdName(d){ return['日','一','二','三','四','五','六'][new Date(d+'T12:00').getDay()]; }
function isWeekend(s){ const w=new Date(s+'T12:00').getDay(); return w===0||w===6; }
function isHoliday(s){ return TW_HOLIDAYS.has(s); }
function isClosed(s){ return S.closedDates.has(s)||isWeekend(s)||isHoliday(s); }
function isPastDate(s){ return s < today(); }
function slotMin(s){ const[h,m]=s.split(':').map(Number); return h*60+m; }
function endTime(slots){
  const so=[...slots].sort();
  const em=slotMin(so[so.length-1])+30;
  return`${String(Math.floor(em/60)).padStart(2,'0')}:${String(em%60).padStart(2,'0')}`;
}
function closeModal(){ document.getElementById('modal-area').innerHTML=''; S.modal=null; S.pickedComp=null; }
function toast(msg,ms=2800){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(t._tid);
  t._tid=setTimeout(()=>t.classList.remove('show'),ms);
}

// ── BOOKING HELPERS ───────────────────────────────────────────────────────────
function dayCompBks(date,comp){
  return S.bookings.filter(b=>b.date===date&&b.computer===comp&&b.status!=='cancelled');
}
function bookedSet(date,comp){
  const s=new Set();
  dayCompBks(date,comp).forEach(b=>b.slots.forEach(sl=>s.add(sl)));
  return s;
}
function getSlotBk(date,comp,slot){
  return dayCompBks(date,comp).find(b=>b.slots.includes(slot));
}

// ── TAB ───────────────────────────────────────────────────────────────────────
function renderMain(){
  document.getElementById('main').innerHTML=
    S.tab==='reserve' ? renderReserve() :
    S.tab==='admin'   ? renderAdmin()   : renderReport();
}
function showTab(t){
  if(t==='admin'&&!S.isAdmin){ showLoginModal(); return; }
  S.tab=t;
  ['reserve','admin','report'].forEach(k=>
    document.getElementById('tab-'+k).classList.toggle('active',k===t));
  renderMain();
}

// ── WEEK VIEW ─────────────────────────────────────────────────────────────────
function weekDays(){ return Array.from({length:5},(_,i)=>toStr(addDays(S.weekStart,i))); }

function renderReserve(){
  const days=weekDays();
  const todayStr=today();
  const ws=toStr(S.weekStart);
  const we=toStr(addDays(S.weekStart,4));

  // legend
  let legend=`<div class="comp-legend">`;
  COMPUTERS.forEach(c=>legend+=
    `<div class="flex items-center gap-6">
      <div class="comp-dot" style="background:${COMP_COLORS[c-1]}"></div>
      <span style="font-size:15px;font-weight:600">電腦 ${c}</span>
    </div>`);
  legend+=`</div>`;

  let html=`<div class="card">
  <div class="week-header">
    <div class="flex items-center gap-8">
      <button class="btn btn-sm" onclick="weekNav(-1)">‹ 上週</button>
      <span class="week-label">${fDate(ws)} – ${fDate(we)}</span>
      <button class="btn btn-sm" onclick="weekNav(1)">下週 ›</button>
      <button class="btn btn-sm btn-primary" onclick="jumpToday()">本週</button>
    </div>
    <div class="flex items-center gap-8" style="margin-left:auto">
      <label style="margin:0;white-space:nowrap">跳至日期</label>
      <input type="date" style="width:170px" onchange="jumpToDate(this.value)">
    </div>
  </div>
  ${legend}
  <div class="week-grid-wrap">
  <table class="week-grid">
  <thead><tr><th style="width:66px">時段</th>`;

  days.forEach(d=>{
    const isToday = d===todayStr;
    let sub='';
    if(isHoliday(d))            sub=`<br><span class="badge badge-red"   style="font-size:12px">國定假日</span>`;
    else if(S.closedDates.has(d)) sub=`<br><span class="badge badge-gray"  style="font-size:12px">休館</span>`;
    else if(isWeekend(d))        sub=`<br><span class="badge badge-gray"  style="font-size:12px">週末</span>`;
    html+=`<th${isToday?' class="today-h"':''}>${fShort(d)} (${wdName(d)})${sub}</th>`;
  });
  html+=`</tr></thead><tbody>`;

  SLOTS.forEach(slot=>{
    html+=`<tr><td class="time-cell">${slot}</td>`;
    days.forEach(d=>{
      const closed   = isClosed(d);
      const pastDate = isPastDate(d);
      const nowMin   = new Date().getHours()*60+new Date().getMinutes();
      const pastSlot = d===todayStr && slotMin(slot)<nowMin;
      const notAvail = closed||pastDate||pastSlot;

      let chips='';
      if(!notAvail){
        COMPUTERS.forEach(c=>{
          const bk=getSlotBk(d,c,slot);
          if(bk && bk.slots[0]===slot){
            chips+=`<div class="booking-chip ${CHIP_CLS[c-1]}"
              title="電腦${c}｜${bk.dept}｜${bk.name}｜${bk.phone}${bk.ext?' #'+bk.ext:''}">
              <div class="chip-name">C${c} ${bk.name}</div>
              <div class="chip-sub">${bk.dept}${bk.ext?' #'+bk.ext:' '+bk.phone.slice(-4)}</div>
            </div>`;
          }
        });
        const allFull=COMPUTERS.every(c=>bookedSet(d,c).has(slot));
        if(!allFull) chips+=`<div class="slot-add">＋ 點擊預約</div>`;
      }

      const cls   = notAvail ? `slot-cell ${closed?'closed-cell':'past-cell'}` : 'slot-cell';
      const click = notAvail ? '' : ` onclick="openModal('${d}','${slot}')"`;
      html+=`<td class="${cls}"${click}>${chips}</td>`;
    });
    html+=`</tr>`;
  });
  html+=`</tbody></table></div></div>

  <div class="card" style="margin-top:16px">
    <div class="section-title">查詢 / 取消我的預約</div>
    <div style="background:var(--teal-lt);border-radius:10px;padding:14px 16px;margin-bottom:14px;font-size:14px;color:var(--text-sub);line-height:1.8">
      <b style="color:var(--teal)">取消預約方式：</b><br>
      ① 輸入預約時填寫的電話號碼，點「查詢」<br>
      ② 找到要取消的預約，點「取消預約」<br>
      ③ 輸入預約成功時取得的 <b>4 位取消碼</b>，即可完成取消<br>
      <span style="color:var(--amber);font-weight:600">⚠️ 取消碼印在「預約確認單」上，請列印或拍照保存</span>
    </div>
    <div class="flex gap-8">
      <input type="tel" id="q-phone" placeholder="輸入預約時填寫的電話號碼" style="max-width:260px" value="${S.qPhone}">
      <button class="btn btn-primary" onclick="queryMy()">查詢我的預約</button>
    </div>
    <div id="q-result" style="margin-top:14px">${renderQueryResult()}</div>
  </div>`;
  return html;
}

function renderQueryResult(){
  if(S.qResult===null) return '';
  if(!S.qResult.length) return '<p style="color:var(--text-muted);font-size:15px;padding:8px 0">查無預約紀錄，請確認電話號碼是否正確</p>';
  let html='<div class="table-wrap"><table class="dtable"><thead><tr>'
    +'<th>日期</th><th>電腦</th><th>時段</th><th>單位／姓名</th><th>說明</th><th>狀態</th><th>操作</th>'
    +'</tr></thead><tbody>';
  S.qResult.sort((a,b)=>b.date.localeCompare(a.date)).forEach(b=>{
    const st = b.status==='arrived'  ? '<span class="badge badge-green">已到</span>'
             : b.status==='absent'   ? '<span class="badge badge-red">未到</span>'
             : b.status==='cancelled'? '<span class="badge badge-gray">已取消</span>'
             : '<span class="badge badge-teal">確認中</span>';
    const canCancel = b.status==='confirmed' && b.date >= today();
    const bid = b.id.replace(/'/g,"\'");
    const bcode = (b.cancelCode||'').replace(/'/g,"\'");
    const cancelBtn = canCancel
      ? '<button class="btn btn-xs btn-danger" onclick="userCancelFlow(''+bid+'',''+bcode+'')">取消預約</button>'
      : '';
    html+='<tr>'
      +'<td><b>'+fDate(b.date)+'</b></td>'
      +'<td>電腦 '+b.computer+'</td>'
      +'<td style="white-space:nowrap;font-size:14px">'+b.slots[0]+'–'+endTime(b.slots)+'</td>'
      +'<td style="font-size:13px">'+b.dept+'<br><b>'+b.name+'</b></td>'
      +'<td style="color:var(--text-muted);font-size:13px;max-width:120px">'+(b.note||'—')+'</td>'
      +'<td>'+st+'</td>'
      +'<td>'+cancelBtn+'</td>'
      +'</tr>';
  });
  html+='</tbody></table></div>';
  if(S.blacklist.has(S.qPhone))
    html+='<p style="color:var(--red);margin-top:10px;font-size:14px;font-weight:600">⚠️ 此帳號已列入黑名單，無法進行新預約</p>';
  return html;
}

function userCancelFlow(id, storedCode){
  var html=''
    +'<div class="modal-bg" onclick="if(event.target===this)closeModal()">'
    +'<div class="modal" style="width:400px">'
    +'<div class="modal-title">取消預約</div>'
    +'<div style="background:var(--amber-lt);border:1.5px solid var(--amber-md);border-radius:10px;padding:14px 16px;margin-bottom:18px;font-size:14px;color:var(--text-sub);line-height:1.9">'
    +'<b style="color:var(--amber)">📋 請輸入取消碼</b><br>'
    +'取消碼是預約成功時顯示的 <b>4 位數字</b>，印在「預約確認單」上。<br>'
    +'若已列印或拍照，請輸入確認單上的取消碼。'
    +'</div>'
    +'<div class="field"><label>取消碼（4 位數字）</label>'
    +'<input id="cancel-code-input" type="text" inputmode="numeric" maxlength="4" placeholder="請輸入 4 位取消碼"'
    +' style="font-size:26px;text-align:center;letter-spacing:12px;font-weight:700;padding:12px">'
    +'</div>'
    +'<div class="flex gap-8 mt-8">'
    +'<button class="btn btn-danger w-full" style="justify-content:center;font-size:15px" id="do-cancel-btn">確認取消預約</button>'
    +'<button class="btn w-full" style="justify-content:center;font-size:15px" onclick="closeModal()">返回</button>'
    +'</div></div></div>';
  document.getElementById('modal-area').innerHTML=html;
  var inp=document.getElementById('cancel-code-input');
  var btn=document.getElementById('do-cancel-btn');
  if(inp) inp.focus();
  function doCancel(){
    var v=(inp?inp.value:'').trim();
    if(!v){ toast('請輸入取消碼'); return; }
    if(v!==String(storedCode)){ toast('❌ 取消碼錯誤，請重新確認'); inp.value=''; inp.focus(); return; }
    var b=S.bookings.find(function(bk){return bk.id===id;});
    if(!b){ toast('找不到此筆預約'); return; }
    b.status='cancelled';
    if(window._fbUpdateBooking) window._fbUpdateBooking(id,{status:'cancelled'});
    closeModal();
    S.qResult=S.bookings.filter(function(bk){return bk.phone===S.qPhone;});
    document.getElementById('q-result').innerHTML=renderQueryResult();
    toast('✅ 預約已取消');
  }
  if(inp) inp.addEventListener('keydown',function(e){if(e.key==='Enter') doCancel();});
  if(btn) btn.addEventListener('click', doCancel);
}


function weekNav(dir){ S.weekStart=addDays(S.weekStart,dir*7); renderMain(); }
function jumpToday(){ S.weekStart=getMonday(new Date()); renderMain(); }
function jumpToDate(v){ if(v){ S.weekStart=getMonday(new Date(v+'T12:00')); renderMain(); } }
function queryMy(){
  const p=document.getElementById('q-phone')?.value.trim();
  if(!p){ toast('請輸入電話號碼'); return; }
  S.qPhone=p;
  S.qResult=S.bookings.filter(b=>b.phone===p);
  document.getElementById('q-result').innerHTML=renderQueryResult();
}

// ── BOOKING MODAL（點格帶入日期+起始時段，選電腦→選時數）────────────────────
function openModal(date, startSlot){
  S.modal = { date, startSlot };
  S.pickedComp = null;
  S.form = { dept:'', name:'', phone:'', ext:'', note:'', _dur:1 };
  document.getElementById('modal-area').innerHTML = renderModalHTML();
}

function renderModalHTML(){
  if(!S.modal) return '';
  const { date, startSlot } = S.modal;

  // ── 電腦卡片 ────────────────────────────────────────────────────────────────
  let compHtml='<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:4px">';
  COMPUTERS.forEach(function(c){
    const bs      = bookedSet(date,c);
    const si      = SLOTS.indexOf(startSlot);
    let avail     = 0;
    for(let i=si; i<SLOTS.length; i++){ if(!bs.has(SLOTS[i])) avail++; else break; }
    avail         = Math.min(avail, MAX_SLOTS);
    const sel     = S.pickedComp===c;
    const disabled= avail===0;
    const label   = disabled ? '已滿' : '最多 '+(avail*0.5).toFixed(1)+'h';
    const clkAttr = disabled ? '' : ' onclick="selComp('+c+')"';
    const border  = sel ? COMP_COLORS[c-1] : 'var(--border-md)';
    const bg      = sel ? COMP_COLORS[c-1]+'22' : '#fff';
    const cursor  = disabled ? 'not-allowed' : 'pointer';
    const opacity = disabled ? '0.4' : '1';
    compHtml += '<div'+clkAttr+' style="border:2px solid '+border+';background:'+bg
      +';border-radius:10px;padding:13px 6px;text-align:center;cursor:'+cursor
      +';opacity:'+opacity+';transition:all .12s">'
      +'<div style="font-size:15px;font-weight:700;color:'+COMP_COLORS[c-1]+'">電腦 '+c+'</div>'
      +'<div style="font-size:13px;color:var(--text-muted);margin-top:3px">'+label+'</div>'
      +'</div>';
  });
  compHtml+='</div>';

  // ── 時數按鈕（選了電腦後才出現）────────────────────────────────────────────
  let durationHtml='';
  if(S.pickedComp!==null){
    const bs   = bookedSet(date,S.pickedComp);
    const si   = SLOTS.indexOf(startSlot);
    let maxA   = 0;
    for(let i=si; i<SLOTS.length; i++){ if(!bs.has(SLOTS[i])) maxA++; else break; }
    maxA = Math.min(maxA, MAX_SLOTS);
    const cur  = S.form._dur || 1;
    const previewSlots = SLOTS.slice(si, si+cur);
    var durBtns='';
    for(var n=1;n<=maxA;n++){
      var btnCls='btn btn-sm'+(cur===n?' btn-gold':'');
      durBtns+='<button class="'+btnCls+'" onclick="setDur('+n+')">'+(n*0.5).toFixed(1)+' 小時</button>';
    }
    durationHtml='<div class="field">'
      +'<label>使用時間</label>'
      +'<div style="display:flex;gap:8px;flex-wrap:wrap">'+durBtns+'</div>'
      +'<div style="margin-top:10px;padding:10px 14px;background:var(--teal-lt);border-radius:8px;font-size:15px;color:var(--teal);font-weight:600">'
      +'預約時段：'+previewSlots[0]+' – '+endTime(previewSlots)
      +'</div></div>';
  }

  return`<div class="modal-bg" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-title">新增預約 — ${fDate(date)} ${startSlot}</div>
    <div class="field"><label>選擇電腦</label>${compHtml}</div>
    ${durationHtml}
    <hr class="divider">
    <div class="field"><label>單位 / 部門</label>
      <input id="m-dept" placeholder="如：資訊組" value="${S.form.dept}" oninput="S.form.dept=this.value">
    </div>
    <div class="field"><label>姓名</label>
      <input id="m-name" placeholder="請輸入姓名" value="${S.form.name}" oninput="S.form.name=this.value">
    </div>
    <div class="grid-2">
      <div class="field"><label>聯絡電話</label>
        <input id="m-phone" type="tel" placeholder="0912-345-678" value="${S.form.phone}" oninput="S.form.phone=this.value">
      </div>
      <div class="field"><label>分機（選填）</label>
        <input id="m-ext" placeholder="如：1234" value="${S.form.ext}" oninput="S.form.ext=this.value">
      </div>
    </div>
    <div class="field"><label>說明（選填）</label>
      <input id="m-note" placeholder="如：需要滑鼠、特殊軟體需求…" value="${S.form.note||''}" oninput="S.form.note=this.value">
    </div>
    <div class="flex gap-8 mt-12">
      <button class="btn btn-primary w-full" style="justify-content:center;font-size:16px" onclick="submitBooking()">確認預約</button>
      <button class="btn w-full" style="justify-content:center;font-size:16px" onclick="closeModal()">取消</button>
    </div>
  </div></div>`;
}

    +'<button class="btn" style="justify-content:center;font-size:14px" id="copy-btn-'+code+'" onclick="copyCode(''+code+'')">📋 複製取消碼</button>'

    +'</div>'

}

function closeSuccessOverlay(){
  var el=document.getElementById('success-overlay');
  if(el) el.remove();
}

function copyCode(code){
  navigator.clipboard.writeText(code).then(function(){
    var btn=document.getElementById('copy-btn-'+code);
    if(btn){ btn.textContent='✅ 已複製！'; btn.style.color='var(--green)'; }
  }).catch(function(){
    // fallback for older browsers
    var ta=document.createElement('textarea');
    ta.value=code; document.body.appendChild(ta);
    ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
    var btn=document.getElementById('copy-btn-'+code);
    if(btn){ btn.textContent='✅ 已複製！'; btn.style.color='var(--green)'; }
  });
}

function selComp(c){
  S.pickedComp=c;
  if(!S.form._dur) S.form._dur=1;
  document.getElementById('modal-area').innerHTML=renderModalHTML();
}
function setDur(n){ S.form._dur=n; document.getElementById('modal-area').innerHTML=renderModalHTML(); }

async function submitBooking(){
  // 從 DOM 或 state 取值
  const dept  = (document.getElementById('m-dept')?.value  || S.form.dept).trim();
  const name  = (document.getElementById('m-name')?.value  || S.form.name).trim();
  const phone = (document.getElementById('m-phone')?.value || S.form.phone).trim();
  const ext   = (document.getElementById('m-ext')?.value   || S.form.ext).trim();
  const note  = (document.getElementById('m-note')?.value  || S.form.note||'').trim();
  if(!dept)       { toast('請填寫單位');   return; }
  if(!name)       { toast('請填寫姓名');   return; }
  if(!phone)      { toast('請填寫電話');   return; }
  if(S.pickedComp===null){ toast('請選擇電腦'); return; }
  if(!S.form._dur){ toast('請選擇使用時間'); return; }
  if(S.blacklist.has(phone)){ toast('⚠️ 此電話已列入黑名單，無法預約'); return; }

  const si    = SLOTS.indexOf(S.modal.startSlot);
  const slots = SLOTS.slice(si, si+S.form._dur);
  const bs    = bookedSet(S.modal.date, S.pickedComp);
  for(const sl of slots) if(bs.has(sl)){ toast('選擇的時段已被預約，請重新選擇'); return; }

  const cancelCode = String(Math.floor(1000+Math.random()*9000));
  const bData = {
    date: S.modal.date, computer: S.pickedComp, slots,
    dept, name, phone, ext, note, cancelCode,
    status:'confirmed', createdAt: new Date().toISOString()
  };
  try{
    if(window._fbAddBooking){
      const newId = await window._fbAddBooking(bData);
      bData.id = newId;
    } else {
      bData.id = 'LOCAL-'+Date.now();
      S.bookings.push(bData);
    }
    renderMain();                              // 先刷新週視圖
    showSuccessModal(name, bData.computer, slots, cancelCode, bData); // 再蓋上確認單彈窗
  } catch(e){
    console.error(e);
    toast('❌ 儲存失敗：'+e.message);
  }
}

async function markSt(id, status){
  const b=S.bookings.find(b=>b.id===id); if(!b) return;
  b.status=status;
  if(status==='absent'){
    S.absCount[b.phone]=(S.absCount[b.phone]||0)+1;
    if(window._fbUpdateAbs) await window._fbUpdateAbs(b.phone, S.absCount[b.phone]);
    if(S.absCount[b.phone]>=3 && !S.blacklist.has(b.phone)){
      const info={name:b.name,dept:b.dept,count:S.absCount[b.phone]};
      S.blacklist.set(b.phone, info);
      if(window._fbAddBlacklist) await window._fbAddBlacklist(b.phone, info);
      toast(`⚠️ ${b.name} 累積 3 次未到，已自動列入黑名單`);
    }
  }
  if(window._fbUpdateBooking) await window._fbUpdateBooking(id,{status});
  renderMain();
}

  document.getElementById('modal-area').innerHTML=
    '<div class="modal-bg" onclick="if(event.target===this)closeModal()">'
    +'<div class="modal" style="width:400px">'
    +'<div class="modal-title">編輯說明</div>'
    +'<div class="field"><label>說明內容</label>'
    +'<textarea id="edit-note-input" rows="3" placeholder="輸入說明（可留空）"'
    +' style="resize:none;font-size:15px">'+currentNote.replace(/&#39;/g,"'")+'</textarea>'

}

function renderReport(){

  const absent = f.filter(b=>b.status==='absent').length;
  const arrived= f.filter(b=>b.status==='arrived').length;
  const rate   = total>0 ? Math.round(arrived/total*100) : 0;

  const slotCnt={};
  f.forEach(b=>b.slots.forEach(sl=>{slotCnt[sl]=(slotCnt[sl]||0)+1;}));

// ── EXPORT ────────────────────────────────────────────────────────────────────
function getExport(){
  let f=[...S.bookings];
  if(S.rFrom) f=f.filter(b=>b.date>=S.rFrom);
  if(S.rTo)   f=f.filter(b=>b.date<=S.rTo);
  return f;
}
function stLabel(s){ return s==='arrived'?'已到':s==='absent'?'未到':s==='cancelled'?'取消':'確認'; }

function exportCSV(){
  const f=getExport();
  const rows=[['日期','電腦','單位','姓名','電話','分機','說明','開始','結束','時數','狀態']];
  f.forEach(b=>rows.push([fDate(b.date),`電腦${b.computer}`,b.dept,b.name,b.phone,b.ext||'',b.note||'',b.slots[0],endTime(b.slots),(b.slots.length*0.5).toFixed(1),stLabel(b.status)]));
  const csv=rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  dlBlob('\uFEFF'+csv,'text/csv',`預約紀錄_${today()}.csv`);
  toast('CSV 已下載');
}
function exportXLSX(){
  const f=getExport();
  const ws1=[['日期','電腦','單位','姓名','電話','分機','說明','開始','結束','時數','狀態']];
  f.forEach(b=>ws1.push([fDate(b.date),`電腦${b.computer}`,b.dept,b.name,b.phone,b.ext||'',b.note||'',b.slots[0],endTime(b.slots),+(b.slots.length*0.5).toFixed(1),stLabel(b.status)]));
  const active=f.filter(b=>b.status!=='cancelled');
  const totalH=active.reduce((s,b)=>s+b.slots.length*0.5,0);
  const ws2=[['項目','數值'],['總筆數',f.length],['總時數',+totalH.toFixed(1)],
    ['未到次數',f.filter(b=>b.status==='absent').length],
    ...COMPUTERS.map(c=>[`電腦${c}時數`,+active.filter(b=>b.computer===c).reduce((s,b)=>s+b.slots.length*0.5,0).toFixed(1)])];
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(ws1),'預約清單');
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(ws2),'統計摘要');
  XLSX.writeFile(wb,`電腦預約報表_${today()}.xlsx`);
  toast('Excel 已下載');
}
function dlBlob(content,type,name){
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([content],{type}));
  a.download=name; a.click();
}

  const html=`<!DOCTYPE html><html lang="zh-TW"><head><meta charset="UTF-8">

.sv{font-size:22px;font-weight:700;margin-top:3px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:20px}
.stitle{font-size:14px;font-weight:700;color:#2F4F4F;padding-bottom:5px;border-bottom:2px solid #b0c8c8;margin-bottom:10px}
.br{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.bl{width:55px;text-align:right;font-size:11px;color:#3d5555;font-weight:600}
.bt{flex:1;background:#dde6e6;border-radius:3px;height:13px}
.bf{height:100%;border-radius:3px}
.bv{font-size:11px;color:#7a9090;width:34px}
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:#eaf1f1;padding:6px 9px;text-align:left;border:1px solid #b0c8c8;font-weight:700;color:#2F4F4F}
td{padding:6px 9px;border:1px solid #e0e8e8}
tr:nth-child(even) td{background:#f4f8f4}
@media print{body{padding:0;-webkit-print-color-adjust:exact;print-color-adjust:exact}}
</style></head><body>
<h1>電腦預約系統 — 統計報表</h1>
<div class="sub">查詢區間：${range}　　匯出時間：${new Date().toLocaleString('zh-TW')}</div>
<div class="stats">
  <div class="sc"><div class="sl">總預約筆數</div><div class="sv">${f.length}</div></div>
  <div class="sc"><div class="sl">總使用時數</div><div class="sv" style="color:#018948">${totalH.toFixed(1)}h</div></div>
  <div class="sc"><div class="sl">未到次數</div><div class="sv" style="color:#a42a2b">${absent}</div></div>
  <div class="sc"><div class="sl">報到率</div><div class="sv" style="color:#018948">${rate}%</div></div>
</div>
<div class="g2">
  <div><div class="stitle">熱門時段 TOP 5</div>
    ${topSlots.map(([sl,cnt])=>`<div class="br"><div class="bl">${sl}</div><div class="bt"><div class="bf" style="width:${Math.round(cnt/Math.max(topSlots[0][1],1)*100)}%;background:#2F4F4F"></div></div><div class="bv">${cnt}次</div></div>`).join('')}
  </div>
  <div><div class="stitle">各電腦使用時數</div>
    ${COMPUTERS.map(c=>`<div class="br"><div class="bl">電腦${c}</div><div class="bt"><div class="bf" style="width:${Math.round(compH[c]/maxCH*100)}%;background:${COMP_COLORS[c-1]}"></div></div><div class="bv">${compH[c].toFixed(1)}h</div></div>`).join('')}
  </div>
</div>
<div class="stitle">預約清單（${f.length} 筆）</div>
<table><thead><tr><th>日期</th><th>電腦</th><th>單位</th><th>姓名</th><th>電話/分機</th><th>說明</th><th>時段</th><th>時數</th><th>狀態</th></tr></thead>
<tbody>${rows}</tbody></table>
<script>window.onload=()=>window.print();<\/script>
</body></html>`;
  const w=window.open('','_blank');
  if(w){ w.document.write(html); w.document.close(); }
  else toast('請允許彈出視窗以列印 PDF');
}

// ── APP START ─────────────────────────────────────────────────────────────────
function startApp(){
  document.getElementById('loading-screen').style.display='none';
  document.getElementById('app').style.display='block';
  window._appReady=true;
  renderMain();
}

// 若 Firebase 未設定（本機開發），300ms 後直接啟動
if(typeof window._fbAddBooking==='undefined'){
  setTimeout(startApp, 300);
}
</script>
</body>
</html>
